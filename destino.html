<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Destino - La Semilla de Anu</title>
    <style>
        /* Estilo acorde a tu web principal */
        body {
            background-color: #0d0a07;
            color: #d4bc8c;
            font-family: 'Cambria', serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: radial-gradient(circle, #1a140f 0%, #0d0a07 100%);
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.8rem;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(212, 188, 140, 0.5);
        }

        .dados-contenedor {
            display: flex;
            gap: 30px;
            font-size: 100px; /* Tamaño de los dados */
            margin-bottom: 40px;
        }

        .dado {
            background: #1a140f;
            padding: 10px 25px;
            border: 2px solid #3d2b1f;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 15px #000;
            color: #e8dcc4;
            user-select: none;
        }

        /* Animación de giro */
        .girando {
            animation: rodar 0.15s infinite;
        }

        @keyframes rodar {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-2deg); }
            50% { transform: translate(-3px, 0px) rotate(3deg); }
            75% { transform: translate(1px, 2px) rotate(-1deg); }
            100% { transform: translate(2px, 1px) rotate(0deg); }
        }
