<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Destino - La Semilla de Anu</title>
    <style>
        body {
            background-color: #0d0a07;
            color: #d4bc8c;
            font-family: 'Cambria', serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #1a140f 0%, #0d0a07 100%);
            overflow-x: hidden;
        }

        .contenedor-principal {
            padding: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: clamp(1.2rem, 5vw, 2.5rem); /* Se adapta al tamaño de pantalla */
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(212, 188, 140, 0.4);
        }

        .dados-zona {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        /* --- TAMAÑO DE DADOS PARA MÓVIL (Por defecto) --- */
        .dado {
            background: #2a1f14;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            border: 2px solid #d4bc8c;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            color: #e8dcc4;
            transition: all 0.3s ease;
        }

        /* --- TAMAÑO DE DADOS PARA PC (Pantallas grandes) --- */
        @media (min-width: 800px) {
            .dado {
                width: 150px;
                height: 150px;
                font-size: 100px;
                border-width: 4px;
            }
            .dados-zona { gap: 40px; }
            h1 { margin-bottom: 50px; }
        }

        .
