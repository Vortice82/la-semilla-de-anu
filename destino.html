<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Destino - La Semilla de Anu</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0d0a07; color: #d4bc8c;
            font-family: 'Cambria', serif;
        }
        .main-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; min-height: 100vh;
            background: radial-gradient(circle, #1a140f 0%, #0d0a07 100%);
            padding: 20px;
        }
        h1 {
            text-transform: uppercase; letter-spacing: 3px;
            font-size: clamp(1.2rem, 6vw, 2.5rem); margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(212, 188, 140, 0.4);
        }
        .dados-zona { display: flex; gap: 15px; margin-bottom: 30px; }
        .dado {
            background: #2a1f14; width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; border: 2px solid #d4bc8c; border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6); color: #e8dcc4;
        }
        @media (min-width: 800px) {
            .dado { width: 160px; height: 160px; font-size: 100px; border-width: 4px; }
            .dados-zona { gap: 40px; }
        }
        .girando { animation: vibrar 0.1s infinite; }
        @keyframes vibrar {
            0% { transform: rotate(2deg) translate(1px, 1px); }
            100% { transform: rotate(-2deg) translate(-1px, -1px); }
        }
        #texto-resultado {
            font-size: clamp(1rem, 4vw, 1.5rem); min-height: 80px;
            margin-bottom: 30px; font-style: italic; color: #e8dcc4;
            max-width: 600px; line-height: 1.4;
        }
        .btn-lanzar {
            background: #d4bc8c; color: #1a140f; border: none;
            padding: 15px 40px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; border-radius: 4px; cursor: pointer;
            font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-lanzar:active { transform: scale(0.95); }
        .btn-volver {
            margin-top: 40px; color: #5c4022; text-decoration: none;
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <h1>Tu Destino Anunnaki</h1>
        <div class="dados-zona">
            <div id="d1" class="dado">🎲</div>
            <div id="d2" class="dado">🎲</div>
        </div>
        <div id="texto-resultado">Toca el botón para invocar el decreto de los dioses...</div>
        <button class="btn-lanzar" onclick="lanzar()">Girar Dados</button>
        <a href="index.html" class="btn-volver">← Volver al Templo</a>
    </div>

    <script>
        const opciones = [
            { d: "ENLIL", m: "El Señor del Viento decreta un cambio radical en tu rumbo." },
            { d: "ENKI", m: "La sabiduría de las aguas profundas te guiará en la oscuridad." },
            { d: "ANU", m: "Tu destino ha sido sellado en la corte celestial de los dioses." },
            { d: "INANNA", m: "La estrella de la mañana ilumina el valor que hay en tu pecho." },
            { d: "ERESHKIGAL", m: "No temas a las sombras, allí reside el poder antiguo." }
        ];

        function lanzar() {
            const d1 = document.getElementById('d1');
            const d2 = document.getElementById('d2');
            const res = document.getElementById('texto-resultado');
            
            d1.classList.add('girando');
            d2.classList.add('girando');
            res.innerText = "Consultando el oráculo...";

            setTimeout(() => {
                d1.classList.remove('girando');
                d2.classList.remove('girando');
                
                const r = opciones[Math.floor(Math.random() * opciones.length)];
                const caras = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
                
                d1.innerText = caras[Math.floor(Math.random() * 6)];
                d2.innerText = caras[Math.floor(Math.random() * 6)];

                res.innerHTML = `<strong style="color:#d4bc8c">${r.d:}:</strong><br>"${r.m}"`;
            }, 800);
        }
    </script>
</body>
</html>
