<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Destino - La Semilla de Anu</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0d0a07; color: #d4bc8c;
            font-family: 'Cambria', serif;
        }
        .main-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; min-height: 100vh;
            background: radial-gradient(circle, #1a140f 0%, #0d0a07 100%);
            padding: 20px;
        }
        h1 {
            text-transform: uppercase; letter-spacing: 3px;
            font-size: clamp(1.2rem, 6vw, 2.5rem); margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(212, 188, 140, 0.4);
        }
        .dados-zona { display: flex; gap: 15px; margin-bottom: 30px; }
        .dado {
            background: #2a1f14; width: 85px; height: 85px;
            display: flex; align-items: center; justify-content: center;
            font-size: 55px; border: 2px solid #d4bc8c; border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6); color: #e8dcc4;
        }
        @media (min-width: 900px) {
            .dado { width: 170px; height: 170px; font-size: 110px; border-width: 4px; }
            .dados-zona { gap: 40px; }
        }
        .girando { animation: vibrar 0.1s infinite; }
        @keyframes vibrar {
            0% { transform: rotate(2deg) translate(1px, 1px); }
            100% { transform: rotate(-2deg) translate(-1px, -1px); }
        }
        #texto-resultado {
            font-size: clamp(1.1rem, 4.5vw, 1.7rem); min-height: 120px;
            margin-bottom: 30px; font-style: italic; color: #e8dcc4;
            max-width: 750px; line-height: 1.6;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-lanzar {
            background: #d4bc8c; color: #1a140f; border: none;
            padding: 15px 45px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; border-radius: 4px; cursor: pointer;
            font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .btn-lanzar:active { transform: scale(0.95); }
        .btn-volver {
            margin-top: 40px; color: #5c4022; text-decoration: none;
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid transparent;
        }
        .btn-volver:hover { border-bottom: 1px solid #5c4022; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <h1>Consulta tu Destino</h1>
        <div class="dados-zona">
            <div id="d1" class="dado">🎲</div>
            <div id="d2" class="dado">🎲</div>
        </div>
        <div id="texto-resultado">Lanza los dados para conocer qué te depara el futuro...</div>
        <button class="btn-lanzar" onclick="lanzar()">Girar Dados</button>
        <a href="index.html" class="btn-volver">← Volver al Templo</a>
    </div>

    <script>
        const frases = [
            "El amor nace del recuerdo, vive de la inteligencia y muere por el olvido.",
            "Se aprende poco con la victoria, en cambio mucho con la derrota.",
            "Los libros son como las abejas que llevan el polen de una inteligencia a otra.",
            "No hay nada nuevo bajo el sol, pero cuantas cosas viejas hay que no conocemos.",
            "El niño es realista, el muchacho idealista, el hombre escéptico y el viejo místico.",
            "Para la mayoría de nosotros, la vida verdadera es la vida que no llevamos."
        ];

        function lanzar() {
            const d1 = document.getElementById('d1');
            const d2 = document.getElementById('d2');
            const res = document.getElementById('texto-resultado');
            
            d1.classList.add('girando');
            d2.classList.add('girando');
            res.innerText = "Los dados están decidiendo...";

            setTimeout(() => {
                d1.classList.remove('girando');
                d2.classList.remove('girando');
                
                const fraseFinal = frases[Math.floor(Math.random() * frases.length)];
                const caras = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
                
                d1.innerText = caras[Math.floor(Math.random() * 6)];
                d2.innerText = caras[Math.floor(Math.random() * 6)];

                res.innerHTML = `"${fraseFinal}"`;
            }, 850);
        }
    </script>
</body>
</html>
