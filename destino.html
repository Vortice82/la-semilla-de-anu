<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Destino - La Semilla de Anu</title>
    <style>
        /* Estilos base para centrado absoluto */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0d0a07;
            color: #d4bc8c;
            font-family: 'Cambria', serif;
            overflow: hidden;
        }

        .contenedor-full {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, #1a140f 0%, #0d0a07 100%);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: clamp(1.3rem, 5vw, 2.5rem);
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(212, 188, 140, 0.4);
        }

        .dados-zona {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        /* --- DADOS MÓVIL --- */
        .dado {
            background: #2a1f14;
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            border: 2px solid #d4bc8c;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            color: #e8dcc4;
        }

        /* --- DADOS PC (MUCHO MÁS GRANDES) --- */
        @media (min-width: 900px) {
            .dado {
                width: 180px;
                height: 180px;
                font-size: 110px;
                border-width: 4px;
            }
            .dados-zona { gap: 40px; }
        }

        .girando { animation: vibrar 0.1s infinite; }
        @keyframes vibrar {
            0% { transform: rotate(3deg) translate(1px, 1px); }
            50% { transform: rotate(-3deg) translate(-1px, -1px); }
            100% { transform: rotate(3deg) translate(1px, 1px); }
        }

        #resultado {
            font-size: clamp(1rem, 4vw, 1.5rem);
            min-height: 80px;
            margin-bottom: 30px;
            font-style: italic;
            color: #e8dcc4;
            max-width: 800px;
            line-height: 1.5;
        }

        .btn-lanzar {
            background: #d4bc8c;
            color: #1a140f;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .btn-lanzar:active { transform: scale(0.95); }

        .btn-volver {
            margin-top: 40px;
            color: #5c4022;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="contenedor-full">
        <h1>Tu Destino Anunnaki</h1>
        
        <div class="dados-zona">
            <div id="d1" class="dado">🎲</div>
            <div id="d2" class="dado">🎲</div>
        </div>

        <div id="resultado">Toca el botón para invocar el decreto de los dioses...</div>

        <button class="btn-lanzar" onclick="lanzar()">Girar Dados</button>

        <a href="index.html" class="btn-volver">← Volver al Templo</a>
    </div>

    <audio id="sonido" src="dados.mp3"></audio>

    <script>
        const destinos = [
            { dios: "ENLIL", msg: "El Señor del Viento decreta un cambio radical en tu rumbo." },
            { dios: "ENKI", msg: "La sabiduría de las aguas profundas te guiará en la oscuridad." },
            { dios: "ANU", msg: "Tu destino ha sido sellado en la corte celestial de los dioses." },
            { dios: "INANNA", msg: "La estrella de la mañana ilumina el valor que hay en tu pecho." },
            { dios: "ERESHKIGAL", msg: "No temas a las sombras, pues en ellas reside el poder antiguo." }
        ];

        function lanzar() {
            const d1 = document.getElementById('d1');
            const d2 = document.getElementById('d2');
            const res = document.getElementById('resultado');
            const audio = document.getElementById('sonido');

            // Iniciar efectos
            d1.classList.add('girando');
            d2.classList.add('girando');
            res.innerText = "Los dioses están decidiendo tu suerte...";
            audio.play().catch(() => {});

            setTimeout(() => {
                // Detener efectos
                d1.classList.remove('girando');
                d2.classList.remove('girando');
                
                // Resultado aleatorio
                const r = destinos[Math.floor(Math.random() * destinos.length)];
                const caras = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
                
                d1.innerText = caras[Math.floor(Math.random() * 6)];
                d2.innerText = caras[Math.floor(Math.random() * 6)];

                res.innerHTML = `<strong style="color:#d4bc8c; font-size: 1.3em;">${r.dios}:</strong><br>"${r.msg}"`;
            }, 900);
        }
    </script>
</body>
</html>
