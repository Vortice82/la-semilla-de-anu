<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anu Quest - La Semilla de Anu</title>
    <style>
        /* ESTÉTICA PIXEL ART Y ANUNNAKI */
        body {
            margin: 0;
            background-color: #1a1510;
            color: #e8dcc4;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #2c221a, #4a3b2c);
            border: 4px solid #d4bc8c;
            overflow: hidden;
            image-rendering: pixelated; /* Mantiene el look retro */
        }

        /* DETALLE: El Jugador (Nave Anunnaki) */
        #player {
            position: absolute;
            bottom: 20px;
            left: 180px;
            width: 40px;
            height: 40px;
            background-color: #d4bc8c;
            /* Dibujo pixelado con sombras */
            box-shadow: 
                0 5px 0 #8e7a60, 
                10px 0 0 -5px #f4e4bc, 
                -10px 0 0 -5px #f4e4bc;
            border-radius: 2px;
            transition: left 0.1s ease-out;
        }

        /* DETALLE: Los Enemigos (Símbolos o naves enemigas) */
        .enemy {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #e74c3c;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); /* Forma de diamante */
            box-shadow: inset -3px -3px 0px #c0392b;
        }

        /* DETALLE: Estrellas de fondo para profundidad */
        .star {
            position: absolute;
            background: #fff;
            width: 2px;
            height: 2px;
            opacity: 0.5;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            text-shadow: 2px 2px #000;
        }

        .mensaje {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">ORO RECOLECTADO: <span id="score">0</span></div>
        <div id="player"></div>
    </div>

    <div class="mensaje">
        <p>Usa las <b>Flechas</b> o <b>A/D</b> para moverte</p>
        <p><i>Inspirado en "La Semilla de Anu" de David Robles</i></p>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        
        let score = 0;
        let playerX = 180;
        const playerSpeed = 20;
        
        // --- AJUSTES DE VELOCIDAD (MÁS DESPACIO) ---
        const gameSpeed = 2;       // Píxeles que baja cada enemigo (antes era 5 o más)
        const spawnRate = 1500;    // Aparece un enemigo cada 1.5 segundos (antes era 1000)

        // Movimiento
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'ArrowLeft' || e.key === 'a') && playerX > 0) {
                playerX -= playerSpeed;
            } else if ((e.key === 'ArrowRight' || e.key === 'd') && playerX < 360) {
                playerX += playerSpeed;
            }
            player.style.left = playerX + 'px';
        });

        // Crear estrellas de fondo
        for(let i=0; i<30; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 400 + 'px';
            star.style.top = Math.random() * 600 + 'px';
            container.appendChild(star);
        }

        function createEnemy() {
            const enemy = document.createElement('div');
            enemy.className = 'enemy';
            enemy.style.left = Math.random() * 370 + 'px';
            enemy.style.top = '-40px';
            container.appendChild(enemy);

            let interval = setInterval(() => {
                let top = parseInt(enemy.style.top);
                
                if (top > 600) {
                    // Si escapa, sumamos puntos (o lo que prefieras)
                    score += 10;
                    scoreElement.innerText = score;
                    clearInterval(interval);
                    enemy.remove();
                } else {
                    enemy.style.top = (top + gameSpeed) + 'px';
                }

                // DETECCIÓN DE COLISIÓN
                if (isColliding(player, enemy)) {
                    alert("¡Misión fallida! Has recolectado " + score + " de oro Anunnaki.");
                    score = 0;
                    scoreElement.innerText = score;
                    enemy.remove();
                    location.reload(); 
                }
            }, 20); // Refresco suave cada 20ms
        }

        function isColliding(a, b) {
            let aRect = a.getBoundingClientRect();
            let bRect = b.getBoundingClientRect();
            return !(
                aRect.top > bRect.bottom ||
                aRect.bottom < bRect.top ||
                aRect.right < bRect.left ||
                aRect.left > bRect.right
            );
        }

        // Generar enemigos cada cierto tiempo
        setInterval(createEnemy, spawnRate);

    </script>
</body>
</html>
