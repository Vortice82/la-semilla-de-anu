<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anu Quest - Mobile Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { 
            margin: 0; background-color: #1a1510; color: #e8dcc4; 
            font-family: sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }

        #game-container {
            position: relative; width: 100vw; max-width: 400px; height: 70vh;
            background: #2c221a; border-bottom: 4px solid #d4bc8c; overflow: hidden;
        }

        #player {
            position: absolute; bottom: 20px; left: 50%; width: 40px; height: 40px;
            background: #d4bc8c; transform: translateX(-50%);
            box-shadow: 0 4px 0 #8e7a60; border-radius: 4px; z-index: 10;
        }

        .enemy {
            position: absolute; width: 30px; height: 30px; background: #e74c3c;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); /* ROMBO */
            box-shadow: inset -3px -3px 0px #c0392b;
        }

        .bullet {
            position: absolute; width: 6px; height: 15px; background: #f4e4bc;
            border-radius: 2px; box-shadow: 0 0 5px #fff;
        }

        /* CONTROLES MÓVIL */
        #controls {
            display: flex; width: 100%; max-width: 400px; height: 25vh;
            padding: 10px; gap: 10px; background: #1a1510;
        }
        .btn {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #4a3b2c; border: 2px solid #d4bc8c; border-radius: 8px;
            font-size: 24px; color: #e8dcc4; active-background: #d4bc8c;
        }
        .btn-fire { background: #8e7a60; flex: 1.5; font-weight: bold; }
        
        #ui { position: absolute; top: 10px; left: 10px; z-index: 20; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">ORO: <span id="score">0</span></div>
    <div id="player"></div>
</div>

<div id="controls">
    <div class="btn" id="btn-left">◀</div>
    <div class="btn btn-fire" id="btn-shoot">DISPARAR</div>
    <div class="btn" id="btn-right">▶</div>
</div>

<script>
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score');
    
    let score = 0;
    let playerPos = container.offsetWidth / 2 - 20;
    let enemies = [];
    let bullets = [];
    
    // --- AJUSTES DE VELOCIDAD ---
    const speed = 1.5; // Los rombos bajan lento
    const bulletSpeed = 5;
    const playerMove = 30;

    function updatePlayer() {
        player.style.left = playerPos + 'px';
    }
    updatePlayer();

    // Movimiento
    document.getElementById('btn-left').onclick = () => { if(playerPos > 20) playerPos -= playerMove; updatePlayer(); };
    document.getElementById('btn-right').onclick = () => { if(playerPos < container.offsetWidth - 60) playerPos += playerMove; updatePlayer(); };
    document.getElementById('btn-shoot').onclick = () => { shoot(); };

    // Teclado PC también
    document.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowLeft') document.getElementById('btn-left').onclick();
        if(e.key === 'ArrowRight') document.getElementById('btn-right').onclick();
        if(e.key === ' ') shoot();
    });

    function shoot() {
        const b = document.createElement('div');
        b.className = 'bullet';
        b.style.left = (playerPos + 17) + 'px';
        b.style.bottom = '60px';
        container.appendChild(b);
        bullets.push(b);
    }

    function createEnemy() {
        const e = document.createElement('div');
        e.className = 'enemy';
        e.style.left = Math.random() * (container.offsetWidth - 40) + 'px';
        e.style.top = '0px';
        container.appendChild(e);
        enemies.push(e);
    }

    function loop() {
        // Mover balas
        for(let i = bullets.length-1; i>=0; i--) {
            let b = bullets[i];
            let bottom = parseInt(b.style.bottom);
            if(bottom > container.offsetHeight) {
                b.remove(); bullets.splice(i,1);
            } else {
                b.style.bottom = (bottom + bulletSpeed) + 'px';
            }
        }

        // Mover enemigos (rombos)
        for(let i = enemies.length-1; i>=0; i--) {
            let e = enemies[i];
            let top = parseInt(e.style.top);
            if(top > container.offsetHeight) {
                e.remove(); enemies.splice(i,1);
            } else {
                e.style.top = (top + speed) + 'px';
            }

            // Colisión con Balas
            bullets.forEach((b, bIndex) => {
                if(isColliding(b, e)) {
                    score += 10;
                    scoreElement.innerText = score;
                    e.remove(); enemies.splice(i,1);
                    b.remove(); bullets.splice(bIndex,1);
                }
            });

            // Colisión con Jugador
            if(isColliding(player, e)) {
                alert("JUEGO TERMINADO - PUNTOS: " + score);
                location.reload();
            }
        }
        requestAnimationFrame(loop);
    }

    function isColliding(a, b) {
        let rect1 = a.getBoundingClientRect();
        let rect2 = b.getBoundingClientRect();
        return !(rect1.right < rect2.left || rect1.left > rect2.right || rect1.bottom < rect2.top || rect1.top > rect2.bottom);
    }

    setInterval(createEnemy, 2000); // Aparece un rombo cada 2 segundos
    loop();
</script>

</body>
</html>
