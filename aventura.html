<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino a Nippur - La Semilla de Anu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0d0a07; 
            color: #e8dcc4; 
            font-family: 'Cambria', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }
        .game-container {
            width: 100%;
            max-width: 700px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #d4bc8c;
            padding: 35px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(212, 188, 140, 0.1);
        }
        h1 { color: #d4bc8c; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 25px; font-size: 1.6rem; border-bottom: 1px solid #3d2b1f; padding-bottom: 10px; }
        #story-text { font-size: 1.25rem; line-height: 1.7; margin-bottom: 35px; color: #f4e4bc; min-height: 120px; text-shadow: 1px 1px 2px #000; }
        .options-container { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .btn-option {
            background: #1a140f;
            color: #d4bc8c;
            border: 1px solid #d4bc8c;
            padding: 18px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .btn-option:hover { background: #d4bc8c; color: #1a140f; box-shadow: 0 0 15px #d4bc8c; transform: translateY(-2px); }
        .back-link { margin-top: 30px; display: block; color: #666; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: #d4bc8c; }
        
        /* Animación suave al cambiar de texto */
        .fade { animation: fadeIn 0.6s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
