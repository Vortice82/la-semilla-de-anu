<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Despertar de Anu - Aventura Interactiva</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:ital,wght@0,400;1,300&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #050403; 
            background-image: radial-gradient(circle at center, #1a140f 0%, #050403 100%);
            color: #e8dcc4; 
            font-family: 'Spectral', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* Contenedor tipo Piedra Sagrada */
        .game-master {
            width: 95%;
            max-width: 800px;
            background: rgba(10, 8, 6, 0.95);
            border: 1px solid #d4bc8c;
            position: relative;
            padding: 40px;
            box-shadow: 0 0 100px rgba(0,0,0,1), 0 0 20px rgba(212, 188, 140, 0.1);
            border-radius: 2px;
        }

        /* Adornos en las esquinas */
        .game-master::before, .game-master::after {
            content: "✦";
            position: absolute;
            color: #d4bc8c;
            font-size: 20px;
        }
        .game-master::before { top: 10px; left: 10px; }
        .game-master::after { bottom: 10px; right: 10px; }

        h1 { 
            font-family: 'Cinzel', serif;
            color: #d4bc8c; 
            text-align: center;
            text-transform: uppercase; 
            letter-spacing: 6px; 
            margin-bottom: 30px;
            font-size: clamp(1.2rem, 4vw, 2rem);
            text-shadow: 0 0 15px rgba(212, 188, 140, 0.5);
        }

        /* Cuadro de texto con efecto de aparición */
        #story-box {
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #f4e4bc;
            min-height: 180px;
            font-style: italic;
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn-divine {
            background: linear-gradient(to right, #1a140f, #2a1f14);
            color: #d4bc8c;
            border: 1px solid #5c4022;
            padding: 20px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .btn-divine:hover {
            border-color: #d4bc8c;
            color: #fff;
            background: #2a1f14;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(212, 188, 140, 0.2);
        }

        .btn-divine::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 188, 140, 0.1), transparent);
            transition: 0.5s;
        }

        .btn-divine:hover::after {
            left: 100%;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #3d2b1f;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            color: #888;
        }

        .stat-val { color: #d4bc8c; margin-left: 5px; }

        .back-temple {
            margin-top: 40px;
            display: block;
            text-align: center;
            color: #5c4022;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .back-temple:hover { color: #d4bc8c; }

        /* Animación de pulso para la Semilla */
        .seed-glow {
            width: 10px; height: 10px;
            background: #d4bc8c;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px #d4bc8c;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 30px #d4bc8c; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

    </style>
</head>
<body>

    <div class="game-master" id="main-container">
        <div class="seed-glow"></div>
        <h1>El Camino a Nippur</h1>
        
        <div id="story-box">
            Iniciando conexión con los registros de Anu...
        </div>

        <div class="options-grid" id="options-container"></div>

        <div class="stats-bar">
            <span>SINCRO: <span class="stat-val" id="stat-sincro">0%</span></span>
            <span>DESTINO: <span class="stat-val" id="stat-destino">Incierto</span></span>
        </div>

        <a href="index.html" class="back-temple">← VOLVER AL TEMPLO SAGRADO</a>
    </div>

            victoria_divina: { text: "Te sientas en el trono. Tu visión se expande a todas las galaxias. La Semilla de Anu ha florecido en ti. Eres el nuevo Arquitecto.", opts: [{ t: "REINICIAR CICLO", n: "start" }], sincro: 100, dest: "Dios" },

                    i++;
