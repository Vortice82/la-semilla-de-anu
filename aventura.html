<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Despertar de Anu | Aventura Narrativa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:ital,wght@0,300;1,400&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000000; /* Negro puro para eliminar el marrón */
            background-image: 
                radial-gradient(circle at center, #1a140f 0%, #000000 100%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #d4bc8c; 
            font-family: 'Spectral', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .game-frame {
            width: 95%;
            max-width: 800px;
            background: rgba(5, 5, 5, 0.95); /* Fondo casi negro */
            border: 1px solid #d4bc8c;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 50px rgba(212, 188, 140, 0.1);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Adornos Dorados */
        .corner { position: absolute; width: 20px; height: 20px; border: 2px solid #d4bc8c; }
        .top-left { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .top-right { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
        .bot-left { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
        .bot-right { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        h1 { 
            font-family: 'Cinzel', serif;
            color: #d4bc8c; 
            text-align: center;
            text-transform: uppercase; 
            letter-spacing: 6px; 
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(212, 188, 140, 0.5);
        }

        .divider { width: 60px; height: 1px; background: #d4bc8c; margin: 0 auto; }

        #story-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #ffffff; /* Texto en blanco para máximo contraste */
            min-height: 150px;
            text-align: center;
            white-space: pre-wrap;
            transition: opacity 0.4s ease;
        }

        .options-box { display: grid; grid-template-columns: 1fr; gap: 12px; }

        .choice-btn {
            background: #0a0a0a;
            color: #d4bc8c;
            border: 1px solid #d4bc8c;
            padding: 15px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .choice-btn:hover {
            background: #d4bc8c;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 188, 140, 0.4);
        }
