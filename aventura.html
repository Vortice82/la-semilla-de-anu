<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Despertar de Anu | Aventura Narrativa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:ital,wght@0,300;1,400&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #050403; 
            background-image: 
                radial-gradient(circle at center, rgba(42, 31, 20, 0.4) 0%, #050403 100%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: #e8dcc4; 
            font-family: 'Spectral', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .game-frame {
            width: 95%;
            max-width: 850px;
            background: rgba(10, 8, 6, 0.98);
            border: 1px solid #d4bc8c;
            padding: 50px;
            position: relative;
            box-shadow: 0 0 100px #000;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .corner { position: absolute; width: 30px; height: 30px; border: 2px solid #d4bc8c; }
        .top-left { top: 15px; left: 15px; border-right: 0; border-bottom: 0; }
        .top-right { top: 15px; right: 15px; border-left: 0; border-bottom: 0; }
        .bot-left { bottom: 15px; left: 15px; border-right: 0; border-top: 0; }
        .bot-right { bottom: 15px; right: 15px; border-left: 0; border-top: 0; }

        h1 { 
            font-family: 'Cinzel', serif;
            color: #d4bc8c; 
            text-align: center;
            text-transform: uppercase; 
            letter-spacing: 8px; 
            font-size: clamp(1rem, 5vw, 1.8rem);
        }

        .divider { width: 100px; height: 1px; background: #d4bc8c; margin: 0 auto; box-shadow: 0 0 10px #d4bc8c; }

        #story-text {
            font-size: 1.35rem;
            line-height: 1.9;
            color: #f4e4bc;
            min-height: 180px;
            text-align: center;
            white-space: pre-wrap; /* Mantiene los espacios y saltos de línea */
            transition: opacity 0.5s ease;
        }

        .options-box { display: grid; grid-template-columns: 1fr; gap: 15px; }

        .choice-btn {
