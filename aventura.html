<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crónicas de Anu | Aventura Interactiva</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:wght@300;400&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000000; 
            color: #d4bc8c; 
            font-family: 'Spectral', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* Marco de la Reliquia */
        .interface {
            width: 95%;
            max-width: 750px;
            background: #050505;
            border: 2px solid #d4bc8c;
            padding: 30px 20px;
            position: relative;
            box-shadow: 0 0 50px rgba(212, 188, 140, 0.2);
            text-align: center;
        }

        /* Esquinas decorativas */
        .c { position: absolute; width: 15px; height: 15px; border: 2px solid #d4bc8c; }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        h1 { 
            font-family: 'Cinzel', serif;
            letter-spacing: 6px;
            font-size: clamp(1rem, 4vw, 1.4rem);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* CONTENEDOR DE IMAGEN (Garantiza visibilidad en GitHub) */
        .img-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto 20px auto;
            border: 1px solid #3d2b1f;
            background: #000;
            line-height: 0;
            min-height: 150px; /* Evita saltos de diseño si tarda en cargar */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-aventura {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        #story-display {
            font-size: clamp(0.95rem, 3.5vw, 1.2rem);
            line-height: 1.6;
            color: #ffffff; 
            min-height: 100px;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .btn-zone { 
            display: flex;
            flex-direction: column;
            gap: 12px; 
            max-width: 400px;
            margin: 0 auto;
        }

        .btn-action {
            background: transparent;
            color: #d4bc8c;
            border: 1px solid #d4bc8c;
            padding: 12px;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .btn-action:hover {
            background: #d4bc8c;
            color: #000;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="interface">
        <div class="c tl"></div><div class="c tr"></div>
        <div class="c bl"></div><div class="c br"></div>

        <h1>Crónicas de Anu</h1>
        
        <div class="img-container">
            <img src="aventura.jpg" class="img-aventura" alt="Reliquia Anunnaki">
        </div>
        
        <div id="story-display">Iniciando protocolo de ADN...</div>

        <div class="btn-zone" id="btn-zone"></div>

        <div class="footer">David Robles Asuncion - La Semilla de Anu</div>
    </div>

    <script>
        const nodes = {
            start: {
                t: "Las ruinas de Nippur vibran bajo tus pies. Ante ti, una consola de tecnología imposible solicita una muestra biológica. La Semilla de Anu reclama su portador.",
                o: [
                    { t: "Vincular ADN", n: "vincular" },
                    { t: "Girar y huir", n: "muerte_desierto" }
                ]
            },
            vincular: {
                t: "El sistema reconoce el ADN semilla. Los muros se desplazan revelando la Ciudad de los Dioses oculta. El conocimiento prohibido de los Anunnaki está a tu alcance.",
                o: [
                    { t: "Entrar al Santuario", n: "santuario" },
                    { t: "Investigar los laboratorios", n: "laboratorio" }
                ]
            },
            santuario: {
                t: "En el centro del santuario, una esfera de luz pura flota. Es la Semilla original. Si la tocas, tu conciencia se expandirá por toda la galaxia.",
                o: [
                    { t: "Tocar la Semilla", n: "final_dios" },
                    { t: "Dudar del poder", n: "muerte_duda" }
                ]
            },
            laboratorio: {
                t: "Ves miles de embriones en suspensión. No sois producto de la evolución, sino de la ingeniería. Un centinela robótico se activa al detectar tu presencia.",
                o: [
                    { t: "Dar comando de mando", n: "final_heredero" },
                    { t: "Luchar contra el centinela", n: "muerte_centinela" }
                ]
            },
            final_dios: {
                t: "Te conviertes en el nuevo Anu. Tu voz ahora guía las estrellas y el destino de la Tierra. Has trascendido la carne.",
                o: [{ t: "VOLVER A EMPEZAR", n: "start" }]
            },
            final_heredero: {
                t: "El centinela se arrodilla. Eres el legítimo heredero de la tecnología Anunnaki. El mundo cambiará bajo tu mandato.",
                o: [{ t: "VOLVER A EMPEZAR", n: "start" }]
            },
            muerte_desierto: {
                t: "El desierto no perdona a los cobardes. Te pierdes en las dunas y el sol borra tu rastro para siempre.",
                o: [{ t: "REINTENTAR", n: "start" }]
            },
            muerte_duda: {
                t: "La Semilla detecta tu miedo. Una descarga de energía reduce tus átomos a ceniza interestelar.",
                o: [{ t: "REINTENTAR", n: "start" }]
            },
            muerte_centinela: {
                t: "Intentar golpear a un dios de metal fue tu último error. No queda nada de ti.",
                o: [{ t: "REINTENTAR", n: "start" }]
            }
        };

        function play(id) {
            const node = nodes[id];
            const display = document.getElementById('story-display');
            const zone = document.getElementById('btn-zone');
            display.innerText = node.t;
            zone.innerHTML = '';
            node.o.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn-action';
                b.innerText = opt.t;
                b.onclick = () => play(opt.n);
                zone.appendChild(b);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            play('start');
        });
    </script>
</body>
</html>
