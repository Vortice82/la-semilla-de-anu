<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oráculo | La Semilla de Anu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #000; color: #d4bc8c; font-family: 'VT323', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .oracle-container { width: 95%; max-width: 500px; border: 3px solid #d4bc8c; background: #1a140f; text-align: center; }
        .visual-area { height: 250px; border-bottom: 3px solid #d4bc8c; background: #000; }
        .visual-area img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .dialogue-area { padding: 30px; min-height: 200px; }
        .oracle-text { font-size: 1.6rem; color: #fff; margin-bottom: 25px; line-height: 1.2; }
        .btn-pixel { background: #2a1f14; border: 1px solid #d4bc8c; color: #d4bc8c; padding: 12px; font-family: 'VT323', monospace; font-size: 1.3rem; cursor: pointer; width: 100%; margin-bottom: 10px; text-transform: uppercase; }
        .btn-pixel:hover { background: #d4bc8c; color: #000; }
    </style>
</head>
<body>
    <div class="oracle-container">
        <div class="visual-area"><img src="oraculo.png" alt="Oráculo"></div>
        <div class="dialogue-area">
            <div id="text-box" class="oracle-text">Los antiguos demandan una respuesta. ¿Aceptas el desafío?</div>
            <div id="options-box">
                <button class="btn-pixel" onclick="start()">SÍ, ACEPTO EL DESAFÍO</button>
                <button class="btn-pixel" onclick="window.location.href='index.html'">HUIR</button>
            </div>
        </div>
    </div>
    <script>
        const riddles = [ {q: "Vuelo sin alas, lloro sin ojos. ¿Qué soy?", a: "V"}, {q: "Soy el hueso de la tierra, forjado en fuego. ¿Qué soy?", a: "M"} ];
        let i = 0;
        function start() { render(); }
        function render() {
            if(i >= riddles.length) {
                document.getElementById('text-box').innerText = "Has demostrado sabiduría. Regresa al templo.";
                document.getElementById('options-box').innerHTML = `<button class="btn-pixel" onclick="window.location.href='index.html'">VOLVER</button>`;
                return;
            }
            document.getElementById('text-box').innerText = riddles[i].q;
            document.getElementById('options-box').innerHTML = `<button class="btn-pixel" onclick="check('A')">ANIMAL</button><button class="btn-pixel" onclick="check('V')">VEGETAL</button><button class="btn-pixel" onclick="check('M')">MINERAL</button>`;
        }
        function check(c) { if(c === riddles[i].a) { alert("¡Correcto!"); i++; render(); } else { alert("Incorrecto..."); } }
    </script>
</body>
</html>
