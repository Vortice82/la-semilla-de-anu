<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escritura Cuneiforme - La Semilla de Anu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0d0a07;
            color: #e8dcc4;
            font-family: 'Cambria', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: url('https://img.icons8.com/ios-filled/50/d4bc8c/hammer.png'), auto; /* Cursor opcional de martillo */
        }

        .instrucciones {
            padding: 20px;
            text-align: center;
            color: #d4bc8c;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: fade 2s infinite alternate;
        }

        @keyframes fade { from { opacity: 0.5; } to { opacity: 1; } }

        /* EL BLOQUE DE PIEDRA */
        .contenedor-piedra {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: 500px;
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png'), #2a221a;
            border: 10px solid #1a140f;
            box-shadow: inset 0 0 100px #000, 0 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            user-select: none;
        }

        .simbolo {
            font-size: 4rem;
            margin: 15px;
            color: #1a140f; /* Oculto inicialmente (mismo color que la piedra) */
            text-shadow: 1px 1px 0px rgba(255,255,255,0.05);
            transition: all 0.1s;
            cursor: pointer;
            position: relative;
        }

        /* Cuando se ha "picado" el símbolo */
        .simbolo.grabado {
            color: #d4bc8c;
            text-shadow: -1px -1px 2px #000, 1px 1px 2px rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        /* Efecto de chispas/polvo al picar */
        .chispa {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #d4bc8c;
            pointer-events: none;
            border-radius: 50%;
            animation: saltar 0.5s ease-out forwards;
        }

        @keyframes saltar {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .btn-volver {
            margin-top: 30px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #3d2b1f;
            color: #d4bc8c;
            text-decoration: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="instrucciones">Golpea la piedra para grabar los mensajes de Anu</div>

    <div class="contenedor-piedra" id="piedra">
        <div class="simbolo">𒀭</div>
        <div class="simbolo">𒂗</div>
        <div class="simbolo">𒆠</div>
        <div class="simbolo">𒈗</div>
        <div class="simbolo">𒂍</div>
        <div class="simbolo">𒆳</div>
        <div class="simbolo">叮</div>
        <div class="simbolo">𒀀</div>
    </div>

    <a href="index.html" class="btn-volver">Volver al Templo</a>

    <audio id="sonidoCincel">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const piedra = document.getElementById('piedra');
        const sonido = document.getElementById('sonidoCincel');

        document.querySelectorAll('.simbolo').forEach(simbolo => {
            simbolo.addEventListener('mousedown', function(e) {
                // Reproducir sonido
                sonido.currentTime = 0;
                sonido.play();

                // Marcar como grabado
                this.classList.add('grabado');

                // Crear chispas visuales
                for(let i=0; i<6; i++) {
                    crearChispa(e.pageX, e.pageY);
                }
            });
        });

        function crearChispa(x, y) {
            const chispa = document.createElement('div');
            chispa.className = 'chispa';
            document.body.appendChild(chispa);

            const rect = piedra.getBoundingClientRect();
            chispa.style.left = x + 'px';
            chispa.style.top = y + 'px';

            // Dirección aleatoria de la chispa
            const moveX = (Math.random() - 0.5) * 100;
            const moveY = (Math.random() - 0.5) * 100;
            chispa.style.setProperty('--x', moveX + 'px');
            chispa.style.setProperty('--y', moveY + 'px');

            setTimeout(() => chispa.remove(), 500);
        }
    </script>
</body>
</html>
