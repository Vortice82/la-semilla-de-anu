<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario Cuneiforme - La Semilla de Anu</title>
    <style>
        body { background-color: #2c221a; color: #e8dcc4; font-family: 'Cambria', serif; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        h1 { color: #d4bc8c; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 2px; }
        .subtitle { font-style: italic; margin-bottom: 30px; opacity: 0.8; }

        /* Cuadrícula de Vocabulario */
        .grid-simbolos { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 15px; 
            margin-bottom: 40px; 
        }
        
        .card { 
            background: #3d2f25; 
            padding: 15px; 
            border: 1px solid #8e7a60; 
            border-radius: 8px;
            transition: transform 0.2s;
        }
        
        .card:hover { transform: translateY(-5px); border-color: #d4bc8c; }
        
        .simbolo { 
            font-size: 3.5em; 
            display: block; 
            margin-bottom: 10px; 
            color: #f4e4bc;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .card b { color: #d4bc8c; font-size: 1.1em; display: block; }
        .card span.trad { font-size: 0.9em; opacity: 0.7; }

        /* Pizarra de Arcilla */
        .pizarra-contenedor { 
            background-color: #c5b395; 
            margin: 20px auto; 
            border-radius: 10px; 
            border: 10px solid #5a3e2b; 
            width: 100%; 
            max-width: 600px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.1);
        }
        
        canvas { display: block; cursor: url('https://cur.cursors-4u.net/others/oth-2/oth165.cur'), crosshair; touch-action: none; width: 100%; }

        .controles { margin-top: 20px; }
        button { 
            padding: 12px 30px; 
            cursor: pointer; 
            background: #5a3e2b; 
            color: #d4bc8c; 
            border: 2px solid #d4bc8c; 
            border-radius: 5px; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .volver { display: inline-block; margin-top: 50px; color: #d4bc8c; text-decoration: none; padding: 10px 25px; border: 1px solid #d4bc8c; border-radius: 4px; }
        .volver:hover { background: #d4bc8c; color: #2c221a; }
    </style>
</head>
<body>

<div class="container">
    <h1>Escritura Cuneiforme</h1>
    <p class="subtitle">Vocabulario fundamental de la civilización sumeria</p>

    <div class="grid-simbolos">
        <div class="card"><span class="simbolo">𒀭</span><b>AN</b><span class="trad">(Dios / Cielo)</span></div>
        <div class="card"><span class="simbolo">𒆠</span><b>KI</b><span class="trad">(Tierra)</span></div>
        <div class="card"><span class="simbolo">𒈗</span><b>LUGAL</b><span class="trad">(Rey)</span></div>
        <div class="card"><span class="simbolo">𒂍</span><b>E</b><span class="trad">(Templo / Casa)</span></div>
        <div class="card"><span class="simbolo">𒀀</span><b>A</b><span class="trad">(Agua)</span></div>
        <div class="card"><span class="simbolo">𒌓</span><b>UD</b><span class="trad">(Sol / Día)</span></div>
        <div class="card"><span class="simbolo">𒋀</span><b>URUS</b><span class="trad">(Hermano)</span></div>
        <div class="card"><span class="simbolo">মু</span><b>MU</b><span class="trad">(Nombre / Año)</span></div>
    </div>

    <h3>Tu Tablilla de Arcilla</h3>
    <p style="font-size: 0.9em; margin-bottom: 10px;">Usa el ratón o el dedo para tallar los símbolos</p>
    
    <div class="pizarra-contenedor">
        <canvas id="pizarra" width="600" height="400"></canvas>
    </div>
    
    <div class="controles">
        <button onclick="limpiar()">Limpiar Tablilla</button>
    </div>

    <a href="index.html" class="volver">← Volver al Sitio Principal</a>
</div>

<script>
    const canvas = document.getElementById('pizarra');
    const ctx = canvas.getContext('2d');
    let dibujando = false;

    ctx.strokeStyle = '#423124';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function obtenerCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
        else { cx = e.clientX; cy = e.clientY; }
        return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
    }

    function iniciar(e) { dibujando = true; const c = obtenerCoords(e); ctx.beginPath(); ctx.moveTo(c.x, c.y); }
    function mover(e) { if (!dibujando) return; const c = obtenerCoords(e); ctx.lineTo(c.x, c.y); ctx.stroke(); }
    function parar() { dibujando = false; }

    canvas.addEventListener('mousedown', iniciar);
    canvas.addEventListener('mousemove', mover);
    window.addEventListener('mouseup', parar);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); iniciar(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); mover(e); });
    canvas.addEventListener('touchend', parar);

    function limpiar() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
</script>

</body>
</html>
