<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tablilla Real - La Semilla de Anu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0d0a07;
            color: #e8dcc4;
            font-family: 'Cambria', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Puntero de martillo corregido para PC */
            cursor: url('https://img.icons8.com/ios-filled/50/d4bc8c/hammer.png') 25 25, auto;
        }

        /* CABECERA FIJA CON TRADUCCIÓN */
        .header-arqueologia {
            position: sticky;
            top: 0;
            width: 100%;
            background: linear-gradient(to bottom, #1a140f, #0d0a07);
            border-bottom: 2px solid #3d2b1f;
            z-index: 100;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        #traduccion-display {
            font-size: 1.5rem;
            color: #d4bc8c;
            height: 1.6em;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(212, 188, 140, 0.5);
        }

        .instruccion {
            font-size: 0.75rem;
            color: #8a7a5f;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* CONTENEDOR DE PIEDRA */
        .tablilla-master {
            width: 95%;
            max-width: 1000px;
            margin: 30px 0 100px 0;
            background: #2a221a url('https://www.transparenttextures.com/patterns/rock.png');
            border: 15px solid #1a140f;
            box-shadow: inset 0 0 100px #000, 0 20px 50px rgba(0,0,0,0.8);
            display: grid;
            /* Distribución profesional de símbolos */
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            padding: 40px;
            user-select: none;
        }

        .bloque-cuneiforme {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: rgba(0, 0, 0, 0.4); /* Símbolo "tallado" pero oscuro */
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: inherit;
            border-radius: 8px;
            position: relative;
        }

        /* ESTADO GRABADO (Al picar) */
        .bloque-cuneiforme.grabado {
            color: #d4bc8c;
            text-shadow: -2px -2px 1px #000, 2px 2px 4px rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            transform: scale(1.1) translateZ(10px);
        }

        /* EFECTO DE POLVO DE PIEDRA */
        .chispa {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #d4bc8c;
            pointer-events: none;
            border-radius: 50%;
            z-index: 1000;
            animation: estallido 0.6s ease-out forwards;
        }

        @keyframes estallido {
            0% { transform: translate(0,0); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)); opacity: 0; }
        }

        .btn-regreso {
            margin-bottom: 60px;
            padding: 12px 30px;
            border: 1px solid #3d2b1f;
            color: #8a7a5f;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-regreso:hover { border-color: #d4bc8c; color: #d4bc8c; }

        @media (max-width: 600px) {
            .tablilla-master { grid-template-columns: repeat(3, 1fr); padding: 20px; }
            .bloque-cuneiforme { font-size: 2.5rem; }
            #traduccion-display { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="header-arqueologia">
        <div class="instruccion">Descifrando Tablilla Cuneiforme</div>
        <div id="traduccion-display">Pica la piedra para traducir</div>
    </div>

    <div class="tablilla-master" id="tablilla">
        <div class="bloque-cuneiforme" data-trad="AN / ANU (Cielo / Dios)">𒀭</div>
        <div class="bloque-cuneiforme" data-trad="EN (Señor / Sacerdote)">𒂗</div>
        <div class="bloque-cuneiforme" data-trad="KI (Tierra)">𒆠</div>
        <div class="bloque-cuneiforme" data-trad="DINGIR (Deidad)">𒀭</div>
        <div class="bloque-cuneiforme" data-trad="LUGAL (Rey / Gran Hombre)">𒈗</div>
        <div class="bloque-cuneiforme" data-trad="GAL (Grande)">𒃲</div>
        <div class="bloque-cuneiforme" data-trad="E2 (Casa / Templo)">𒂍</div>
        <div class="bloque-cuneiforme" data-trad="KUR (Montaña / Tierra Extraña)">𒆳</div>
        <div class="bloque-cuneiforme" data-trad="UD / UTU (Sol / Luz)">𒌓</div>
        <div class="bloque-cuneiforme" data-trad="NANNA (Luna)">𒋀𒆠</div>
        <div class="bloque-cuneiforme" data-trad="MUL (Estrella / Planeta)">𒀯</div>
        <div class="bloque-cuneiforme" data-trad="A (Agua / Origen)">𒀀</div>
        <div class="bloque-cuneiforme" data-trad="TI (Vida / Costilla)">𒋾</div>
        <div class="bloque-cuneiforme" data-trad="MU (Nombre / Año)">𒈬</div>
        <div class="bloque-cuneiforme" data-trad="KA (Boca / Palabra)">𒅗</div>
        <div class="bloque-cuneiforme" data-trad="SAG (Cabeza / Primero)">𒊕</div>
        <div class="bloque-cuneiforme" data-trad="SHU (Mano)">𒋗</div>
        <div class="bloque-cuneiforme" data-trad="GUD (Toro Celeste)">𒄞</div>
        <div class="bloque-cuneiforme" data-trad="UR (Guerrero / Perro)">𒌨</div>
        <div class="bloque-cuneiforme" data-trad="NAM (Destino)">𒉆</div>
        <div class="bloque-cuneiforme" data-trad="ME (Decreto Divino)">𒈨</div>
        <div class="bloque-cuneiforme" data-trad="IB (Cintura / Centro)">𒅁</div>
        <div class="bloque-cuneiforme" data-trad="GI (Noche / Caña)">ギー</div>
        <div class="bloque-cuneiforme" data-trad="KAS (Cerveza / Viaje)">𒁉</div>
        <div class="bloque-cuneiforme" data-trad="NIN (Señora / Dama)">𒊩𒌆</div>
        <div class="bloque-cuneiforme" data-trad="DUMU (Hijo / Descendiente)">𒌉</div>
        <div class="bloque-cuneiforme" data-trad="AMA (Madre)">𒂼</div>
        <div class="bloque-cuneiforme" data-trad="GIR (Espada / Pie)">ギー</div>
        <div class="bloque-cuneiforme" data-trad="ABZU (Abismo de Agua)">𒀊𒍪</div>
        <div class="bloque-cuneiforme" data-trad="SIG (Brillante / Amarillo)">𒋛</div>
    </div>

    <a href="index.html" class="btn-regreso">Regresar al Templo de Anu</a>

    <audio id="audioImpacto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audioImpacto');
        const display = document.getElementById('traduccion-display');

        document.querySelectorAll('.bloque-cuneiforme').forEach(el => {
            const alPicar = (e) => {
                if(e.type === 'touchstart') e.preventDefault();

                // Sonido con reset para permitir spam
                audio.currentTime = 0;
                audio.play().catch(()=>{});

                // Activar visualmente
                el.classList.add('grabado');
                display.innerText = el.getAttribute('data-trad');

                // Generar fragmentos de piedra (chispas)
                const touch = e.touches ? e.touches[0] : e;
                for(let i=0; i<10; i++) {
                    crearFragmento(touch.pageX, touch.pageY);
                }
            };

            el.addEventListener('mousedown', alPicar);
            el.addEventListener('touchstart', alPicar);
        });

        function crearFragmento(x, y) {
            const f = document.createElement('div');
            f.className = 'chispa';
            document.body.appendChild(f);
            
            f.style.left = x + 'px';
            f.style.top = y + 'px';

            const velX = (Math.random() - 0.5) * 150;
            const velY = (Math.random() - 0.5) * 150;
            
            f.style.setProperty('--x', velX + 'px');
            f.style.setProperty('--y', velY + 'px');

            setTimeout(() => f.remove(), 600);
        }
    </script>
</body>
</html>
