        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {

            font-family: 'Cambria', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. PORTADA Y BOTONES */
        .main-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 20px 0;
        }

        .portada-img {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }

        .botones-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .btn {
            position: absolute;
            background: rgba(232, 220, 196, 0.85);
            border: 1px solid #8e7a60;
            border-radius: 4px;
            color: #2c221a;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Posiciones exactas */
        .btn-escritura { top: 12.5%; left: 8%; width: 25%; height: 6%; background: #553c28; color: #fff; border-color: #d4bc8c; }

        .btn-instagram { top: 39.5%; left: 67%; width: 25%; height: 6%; }
        .btn-youtube   { top: 48.5%; left: 67%; width: 25%; height: 6%; }

        /* 3. SECCIÓN MAPA Y TEXTO (Lo que faltaba) */
        .seccion-inferior {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        .mapa-img {
            width: 100%;
            height: auto;
            border: 1px solid #d4bc8c;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .texto-paises {
            line-height: 1.6;
            margin-bottom: 50px;
        }

        .texto-paises h2 {
            color: #d4bc8c;
            margin-bottom: 15px;
            font-size: 1.4em;
        }

        #game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 46, 0.98);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background: #1a1a2e;
            border: 3px solid #d4bc8c;
            max-width: 90vw;
            max-height: 50vh;
            touch-action: none;
        }
