<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - David Robles</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0d0a07; 
            color: #e8dcc4;
            font-family: 'Cambria', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            overflow-x: hidden;
        }
        .seo-title {
            color: #d4bc8c;
            padding: 30px 10px;
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
        }
        .templo-master {
            position: relative;
            width: 96%;
            max-width: 1300px;
            margin-bottom: 50px;
            border: 1px solid #3d2b1f;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            background: #000;
        }
        .background-design { width: 100%; height: auto; display: block; }
        .img-pc { display: none; }
        .img-movil { display: block; }
        @media (min-width: 800px) { .img-pc { display: block; } .img-movil { display: none; } }

        .botones-capa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(0.5rem, 1.8vw, 0.95rem);
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        /* Estilos de botones */
        .btn-escritura, .btn-juego, .btn-dioses, .btn-destino { background: rgba(92, 64, 34, 0.92); color: #fff; border: 1px solid #f4e4bc; }
        .btn-destino { background: rgba(139, 69, 19, 0.95); border-color: #d4bc8c; }
        .btn-tiktok, .btn-correo, .btn-instagram, .btn-youtube { background: rgba(0, 0, 0, 0.85); color: #d4bc8c; border: 1px solid #3d2b1f; }
        .btn-comprar { background: #d4bc8c !important; color: #1a140f !important; border: 2px solid #fff !important; animation: latido 2s infinite; }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Coordenadas */
        .btn-escritura { top: 52%; left: 8%; width: 24%; height: 6%; }
        .btn-juego     { top: 61%; left: 8%; width: 24%; height: 6%; }
        .btn-dioses    { top: 70%; left: 8%; width: 24%; height: 6%; }
        .btn-destino   { top: 79%; left: 8%; width: 24%; height: 6%; }

        .btn-comprar   { top: 55%; left: 68%; width: 24%; height: 6%; }
        .btn-tiktok    { top: 64%; left: 68%; width: 24%; height: 6%; }
        .btn-correo    { top: 73%; left: 68%; width: 24%; height: 6%; }
        .btn-instagram { top: 82%; left: 68%; width: 24%; height: 6%; }
        .btn-youtube   { top: 91%; left: 68%; width: 24%; height: 6%; }

        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; z-index: 5; }
        
        .seccion-global { width: 100%; max-width: 1000px; padding: 40px 20px; text-align: center; }
        .mapa-img { width: 100%; max-width: 900px; height: auto; border: 1px solid #3d2b1f; margin-bottom: 40px; }
    </style>
</head>
<body>
    <h1 class="seo-title">La Semilla de Anu</h1>
    <div class="templo-master">
        <img src="portada-movil.png" class="background-design img-movil">
        <img src="portada-pc.png" class="background-design img-pc">
        <video id="videoDioses" class="video-overlay" loop playsinline muted><source src="video.mp4" type="video/mp4"></video>
        <audio id="audioTetrico"><source src="sonido.mp3" type="audio/mpeg"></audio>

        <div class="botones-capa">
            <a href="cuneiforme.html" class="btn-invisible btn-escritura">ESCRITURA</a>
            <a href="juego.html" class="btn-invisible btn-juego">EL JUEGO</a>
            <a href="javascript:void(0)" class="btn-invisible btn-dioses" id="btnDioses">DIOSES</a>
            <a href="destino.html" class="btn-invisible btn-destino">DESTINO</a>
            
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-comprar" target="_blank">COMPRAR</a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-tiktok" target="_blank">TIKTOK</a>
            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-correo">CONTACTO</a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-instagram" target="_blank">INSTAGRAM</a>
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-youtube" target="_blank">YOUTUBE</a>
        </div>
    </div>

    <div class="seccion-global">
        <img src="mapa.jpg" class="mapa-img">
    </div>

    <script>
        const btnDioses = document.getElementById('btnDioses');
        const video = document.getElementById('videoDioses');
        const audio = document.getElementById('audioTetrico');

        async function activar() {
            video.style.opacity = "1";
            video.muted = true; 
            await video.play();
            video.muted = false; 
            audio.play().catch(() => {});
        }

        function desactivar() {
            video.style.opacity = "0";
            video.pause();
            audio.pause();
        }

        btnDioses.addEventListener('mouseenter', activar);
        btnDioses.addEventListener('mouseleave', desactivar);
        btnDioses.addEventListener('touchstart', (e) => { e.preventDefault(); activar(); });
        btnDioses.addEventListener('touchend', desactivar);
    </script>
</body>
</html>
