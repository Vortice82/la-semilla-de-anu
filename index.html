    <style>
        /* --- ARQUITECTURA ROBUSTA --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #0d0a07; 
            color: #e8dcc4; 
            font-family: 'Cambria', serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        .seo-title { 
            color: #d4bc8c; 
            padding: 30px 15px; 
            font-size: clamp(1.5rem, 5vw, 2.5rem); 
            text-transform: uppercase; 
            text-align: center; 
            letter-spacing: 5px; 
            width: 100%;
        }

        /* CONTENEDOR MAESTRO RESPONSIVE */
        .templo-master { 
            position: relative; 
            width: 98%; 
            max-width: 1250px; 
            border: 2px solid #3d2b1f; 
            background: #000; 
            overflow: hidden; 
            margin-bottom: 40px; 
            line-height: 0;
            z-index: 1;
        }

        /* Imágenes adaptativas */
        .background-design { width: 100%; height: auto; display: block; position: relative; z-index: 2; }
        .img-pc { display: none; }
        @media (min-width: 850px) { .img-pc { display: block; } .img-movil { display: none; } }
        @media (max-width: 849px) { .img-movil { display: block; } }

        /* --- LA GOTA (VÍDEO RECUPERADO) --- */
        #vid { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0; 
            pointer-events: none; 
            z-index: 5; /* Capa intermedia crítica */
            transition: opacity 0.4s ease-in-out; 
        }

        /* CAPA DE BOTONES */
        .botones-capa { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 10; 
        }

        .btn-invisible { 
            position: absolute; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: clamp(0.45rem, 1.7vw, 0.95rem); 
            text-transform: uppercase; 
            border-radius: 3px; 
            text-align: center; 
            width: 24%; 
            height: 6.8%; 
            transition: transform 0.2s;
        }

        /* Coordenadas del diseño original */
        .btn-col-izq { background: rgba(92, 64, 34, 0.9); color: #fff; border: 1.5px solid #f4e4bc; left: 8.5%; }
        .btn-escritura { top: 32.5%; } 
        .btn-aventura { top: 40.5%; } 
        .btn-oraculo { top: 48.5%; } 
        .btn-arcade { top: 56.5%; } 
        .btn-dioses { top: 64.5%; cursor: pointer; } 
        .btn-destino { top: 72.5%; background: rgba(139, 69, 19, 0.98); }

        .btn-contacto-azul { top: 32.5%; left: 67.5%; background: #0044ff !important; color: #fff !important; border: 2px solid #00ffff !important; box-shadow: 0 0 15px #0044ff; }
        .btn-comprar { top: 40.5%; left: 67.5%; background: #d4bc8c !important; color: #000 !important; border: 2px solid #fff !important; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }

        .btn-rrss { left: 67.5%; background: rgba(0, 0, 0, 0.85); color: #d4bc8c; border: 1px solid #3d2b1f; }
        .btn-tiktok { top: 48.5%; } 
        .btn-instagram { top: 56.5%; } 
        .btn-youtube { top: 64.5%; }

        /* SECCIÓN TEXTO SEO */
        .seccion-global { width: 100%; max-width: 900px; padding: 40px 20px; text-align: center; }
        .mapa-img { width: 100%; height: auto; border: 1px solid #3d2b1f; margin-bottom: 40px; }
        .texto-original { line-height: 2; color: #bfa888; font-size: 1.2rem; text-align: justify; padding-bottom: 120px; }
        .texto-original h2 { color: #d4bc8c; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
    </style>
</head>
