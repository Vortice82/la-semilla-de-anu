<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA SEMILLA DE ANU | Terminal de Acceso</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #020202; 
            color: #d4bc8c; 
            font-family: 'VT323', monospace; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Capa de Ruido/Scanlines tipo CRT */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Estrellas de fondo animadas */
        #stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a140f 0%, #020202 100%);
        }

        .container {
            width: 90%;
            max-width: 1000px;
            z-index: 2;
            padding: 40px;
            border: 1px solid rgba(212, 188, 140, 0.3);
            background: rgba(10, 8, 6, 0.8);
            backdrop-filter: blur(5px);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            letter-spacing: 15px;
            color: #d4bc8c;
            text-shadow: 0 0 20px rgba(212, 188, 140, 0.6);
            margin-bottom: 10px;
        }

        .author-subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 5px;
            color: #8a6d3b;
            text-transform: uppercase;
        }

        /* Sección de "Datos del Libro" */
        .lore-box {
            border-top: 1px solid #3d2b1f;
            border-bottom: 1px solid #3d2b1f;
            padding: 20px 0;
            margin: 30px 0;
            font-size: 1.2rem;
            line-height: 1.4;
            color: #c4b494;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .typewriter-text {
            border-right: 2px solid #d4bc8c;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: typing 4s steps(40) 1s infinite alternate, blink .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #d4bc8c } }
