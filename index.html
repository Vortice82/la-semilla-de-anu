<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>La Semilla de Anu - Sitio Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {

            background-color: #2c221a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
            font-family: 'Cambria', 'Georgia', serif;
            color: #e8dcc4;
        }

        /* CONTENEDOR PORTADA */
        .web-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 10px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .background-design { width: 100%; height: auto; display: block; }

        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #2c221a; 
            font-weight: bold;
            font-size: 2.8vw;
            text-transform: uppercase;
            background-color: rgba(232, 220, 196, 0.85); 
            border: 1px solid #8e7a60; 
            border-radius: 4px;
        }

        @media (min-width: 500px) { .btn-invisible { font-size: 13px; } }

        .btn-escritura { top: 12.5%; left: 9%; width: 22%; height: 6%; background-color: #553c28; color: #e8dcc4; }
        .btn-juego     { top: 21.5%; left: 9%; width: 22%; height: 6%; background-color: #d4bc8c; cursor: pointer; }

        .btn-instagram { top: 39.5%; left: 69%; width: 22%; height: 6%; }
        .btn-youtube   { top: 48.5%; left: 69%; width: 22%; height: 6%; }

        .mapa-img {

            height: auto;
            border: 1px solid #8e7a60;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .info-libro {
            text-align: left;
            padding: 20px;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;

        .resaltado-rojo { color: #ff4d4d; font-weight: bold; }
        .resaltado-azul { color: #00d4ff; font-weight: bold; }
