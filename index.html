<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - David Robles Asuncion</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #120f0d; /* Fondo muy oscuro, casi negro */
            color: #e0d0b0;
            font-family: 'Segoe UI', serif;
        }

        /* --- PORTADA CON FUERZA --- */
        .seccion-principal {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: url('portada-pc.png') no-repeat center top;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        /* Ajuste para móvil: cambiamos a la portada de móvil para que se vea el libro */
        @media (max-width: 600px) {
            .seccion-principal {
                background-image: url('portada-movil.png');
                padding-top: 10px;
            }
        }

        .capa-filtro {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(18,15,13,1) 95%);
            z-index: 1;
        }

        .contenido-interactivo {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 400px;
            margin-top: auto; /* Empuja el contenido hacia la zona visible baja de la portada */
            margin-bottom: 50px;
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            text-shadow: 2px 2px 8px #000;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        /* --- LA VENTANA DE PIEDRA (EL CONTACTO) --- */
        .ventana-piedra {
            background-color: #2c241e;
            background-image: url('https://www.transparenttextures.com/patterns/rock.png');
            border: 5px solid #1a1510;
            border-radius: 4px;
            padding: 20px;
            box-shadow: inset 0 0 15px #000, 0 10px 25px rgba(0,0,0,0.7);
            margin-bottom: 10px; /* Pegada al botón de compra */
        }

        .ventana-piedra h3 {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: #d4af37;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .ventana-piedra input, .ventana-piedra textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #4a3f35;
            color: #fff;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .btn-enviar {
            width: 100%;
            background: #5d2e0d;
            color: #e0d0b0;
            border: 1px solid #1a1510;
            padding: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- EL BOTÓN DE COMPRAR (DEBAJO DE LA PIEDRA) --- */
        .btn-comprar {
            display: block;
            width: 100%;
            background: #d4af37;
            color: #000 !important;
            padding: 18px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        .btn-comprar:hover {
            background: #fff;
        }

        /* --- NAVEGACIÓN Y REDES --- */
        nav {
            position: relative;
            z-index: 3;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: #d4af37;
            text-decoration: none;
            margin: 0 10px;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
        }

        .redes {
            padding: 30px;
            text-align: center;
            background: #120f0d;
        }

        .redes a {
            color: #666;
            margin: 0 10px;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="cuneiforme.html">ESCRITURA</a>
        <a href="juego.html">EL JUEGO</a>
        <a href="destino.html">DESTINO</a>
    </nav>

    <div class="seccion-principal">
        <div class="capa-filtro"></div>
        
        <div class="contenido-interactivo">
            <h1>LA SEMILLA DE ANU</h1>

            <div class="ventana-piedra">
                <h3>MENSAJE A LOS ANUNNAKI</h3>
                <form action="https://formspree.io/f/TU_ID" method="POST">
                    <input type="email" name="email" placeholder="Tu e-mail" required>
                    <textarea name="mensaje" rows="2" placeholder="Escribe aquí..." required></textarea>
                    <button type="submit" class="btn-enviar">ENVIAR TABLILLA</button>
                </form>
            </div>

            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-comprar">
                COMPRAR LIBRO
            </a>
        </div>
    </div>

    <div class="redes">
        <a href="https://www.tiktok.com/@vorticeverde82">TIKTOK</a>
        <a href="https://www.instagram.com/vorticeverde82/">INSTAGRAM</a>
        <a href="https://www.youtube.com/@DRobles82">YOUTUBE</a>
        <p style="margin-top:20px; font-size: 0.7rem; color: #444;">&copy; 2026 David Robles Asuncion</p>
    </div>

</body>
</html>
