<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* --- ESTILOS DE FONDO Y PÁGINA COMPLETA --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita barras de desplazamiento */
            background-color: #2c221a; /* Fondo oscuro detrás del diseño */
            font-family: 'Cambria', 'Georgia', serif; /* Tipografía tipo libro antiguo */
            display: flex;
            justify-content: center; /* Centra horizontalmente */
            align-items: center; /* Centra verticalmente */
        }

        /* --- CONTENEDOR PRINCIPAL QUE USA TU DISEÑO COMO FONDO --- */
        #site_container {
            position: relative;
            height: 100vh; /* Ocupa el 100% de la altura de la ventana */
            width: auto;
            aspect-ratio: 928 / 1238; /* Proporción exacta de tu imagen (928x1238px) */
            background-image: url('portada.png'); /* Usa tu diseño original como fondo */
            background-size: contain; /* ¡CORRECCIÓN! Asegura que la imagen completa sea visible, sin recortes */
            background-position: center; /* Centra la imagen */
            background-repeat: no-repeat; /* Evita que la imagen se repita */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Sombra decorativa */
        }

        /* --- BARRA LATERAL DE BOTONES INTERACTIVOS (Posicionamiento ajustado) --- */
        #botones_bar {
            position: absolute;
            top: 15%; /* Posiciona la barra verticalmente */
            right: 20px; /* Margen derecho */
            width: 200px; /* Ancho de la barra de botones */
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaciado entre botones */
            padding: 20px;
            background: rgba(232, 220, 196, 0.2); /* Sutil fondo transparente de pergamino */
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10; /* Asegura que esté encima */
        }

        /* --- ESTILOS DE LOS BOTONES INTERACTIVOS --- */
        .btn-interactivo {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 25px; /* Bordes redondeados modernos */
            text-decoration: none;
            color: #e8dcc4; /* Texto color crema claro */
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease; /* Efectos suaves */
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        /* Icono SVG dentro del botón */
        .btn-interactivo svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            flex-shrink: 0;
        }
