<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - Sitio Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; 
            background-color: #2c221a; /* Fondo marrón oscuro */
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden; /* Evita barras de desplazamiento */
        }

        .web-container {
            position: relative;
            /* Solución para encajar la imagen sin cortes verticalmente */
            max-height: 100vh; 
            width: auto;
            aspect-ratio: 928 / 1238; /* Proporción de la imagen original */
            display: flex;
            justify-content: center;
        }

        .background-design {
            height: 100%;
            width: auto;
            display: block;
        }

        /* Capa para posicionar los botones sobre la imagen */
        .botones-capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Estilo para los botones (transparentes con texto centrado) */
        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center; /* Centra el texto */
            text-decoration: none;
            color: #d4bc8c; /* Color crema para el texto */
            font-family: 'Cambria', 'Georgia', serif; /* Fuente estilo antiguo */
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase; /* Texto en mayúsculas */
            letter-spacing: 0.5px;
            /* background: rgba(255, 0, 0, 0.3); */ /* Descomenta esta línea para ver las áreas de clic en rojo */
        }

        /* Posiciones exactas para coincidir con los botones diseñados en la imagen */
        .btn-comprar   { top: 12.5%; left: 69%; width: 22%; height: 6%; }
        .btn-tiktok    { top: 21.5%; left: 69%; width: 22%; height: 6%; }
        .btn-correo    { top: 30.5%; left: 69%; width: 22%; height: 6%; }
        .btn-instagram { top: 39.5%; left: 69%; width: 22%; height: 6%; }
        /* Botón de YouTube corregido, misma posición */
        .btn-youtube   { top: 48.5%; left: 69%; width: 22%; height: 6%; }

        /* Ajustes para dispositivos móviles */
        @media (max-width: 600px) {
            .web-container { width: 100vw; height: auto; aspect-ratio: 928 / 1238; max-height: none; }
            .background-design { width: 100%; height: auto; }
            .btn-invisible { font-size: 0.8em; }
        }
    </style>
</head>
<body>

    <div class="web-container">
        <img src="portada.png" class="background-design" alt="La Semilla de Anu">

        <div class="botones-capa">
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-comprar" target="_blank">COMPRAR</a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-tiktok" target="_blank">TIKTOK</a>
            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-correo">CONTACTO</a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-instagram" target="_blank">INSTAGRAM</a>
            
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-youtube" target="_blank">YOUTUBE</a>
        </div>
    </div>

</body>
</html>
