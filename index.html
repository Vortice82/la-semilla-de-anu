<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>La Semilla de Anu - David Robles Asunción</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0d0a07; color: #e8dcc4; font-family: 'Cambria', serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* TU TEMPLO ORIGINAL */
        .templo-master { position: relative; width: 98%; max-width: 1250px; border: 2px solid #3d2b1f; background: #000; overflow: hidden; margin-top: 20px; z-index: 1; }
        .background-design { width: 100%; height: auto; display: block; position: relative; z-index: 2; }
        .img-pc { display: none; }
        @media (min-width: 850px) { .img-pc { display: block; } .img-movil { display: none; } }
        @media (max-width: 849px) { .img-movil { display: block; } }

        /* LA PIEZA QUE FALTA: LA GOTA */
        #vid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.3s; }

        /* TUS BOTONES */
        .botones-capa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .btn-invisible { position: absolute; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; font-size: clamp(0.45rem, 1.7vw, 0.95rem); border-radius: 3px; width: 24%; height: 6.8%; text-transform: uppercase; }
        
        .btn-col-izq { background: rgba(92, 64, 34, 0.9); color: #fff; border: 1.5px solid #f4e4bc; left: 8.5%; }
        .btn-escritura { top: 32.5%; } .btn-aventura { top: 40.5%; } .btn-oraculo { top: 48.5%; } .btn-arcade { top: 56.5%; } 
        .btn-dioses { top: 64.5%; cursor: pointer; } .btn-destino { top: 72.5%; background: rgba(139, 69, 19, 0.98); }

        .btn-mensaje { top: 32.5%; left: 67.5%; background: #0044ff; color: #fff; border: 2px solid #00ffff; }
        .btn-comprar { top: 40.5%; left: 67.5%; background: #d4bc8c; color: #000; border: 2px solid #fff; }
        .btn-rrss { left: 67.5%; background: rgba(0,0,0,0.8); color: #d4bc8c; border: 1px solid #3d2b1f; }
        .btn-tiktok { top: 48.5%; } .btn-instagram { top: 56.5%; } .btn-youtube { top: 64.5%; }

        /* SECCIÓN INFERIOR */
        .seccion-global { width: 100%; max-width: 900px; padding: 40px 20px; text-align: center; }
        .mapa-img { width: 100%; height: auto; border: 1px solid #3d2b1f; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="templo-master">
        <img src="portada-movil.png" class="background-design img-movil">
        <img src="portada-pc.png" class="background-design img-pc">
        
        <video id="vid" loop playsinline muted><source src="video.mp4" type="video/mp4"></video>

        <audio id="audGota"><source src="sonido.mp3" type="audio/mpeg"></audio>
        <audio id="audLatido" loop><source src="latido.mp3" type="audio/mpeg"></audio>
        
        <nav class="botones-capa">
            <a href="cuneiforme.html" class="btn-invisible btn-col-izq btn-escritura">Escritura</a>
            <a href="aventura.html" class="btn-invisible btn-col-izq btn-aventura">Aventura</a>
            <a href="adivinanzas.html" class="btn-invisible btn-col-izq btn-oraculo">Oráculo</a>
            <a href="juego.html" class="btn-invisible btn-col-izq btn-arcade">Arcade</a>
            <a href="javascript:void(0)" class="btn-invisible btn-col-izq btn-dioses" id="btnDioses">Dioses</a>
            <a href="destino.html" class="btn-invisible btn-col-izq btn-destino">Destino</a>
            
            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-mensaje">Mensaje</a>
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-comprar" target="_blank">Comprar</a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-rrss btn-tiktok" target="_blank">TikTok</a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-rrss btn-instagram" target="_blank">Instagram</a>
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-rrss btn-youtube" target="_blank">YouTube</a>
        </nav>
    </div>

    <section class="seccion-global">
        <img src="mapa.jpg" class="mapa-img">
        <div style="text-align: justify; line-height: 1.6;">
            <p>Descubre la obra de <b>David Robles Asunción</b>, "La semilla de Anu: Volumen 1 Anunaki". Disponible en las principales librerías.</p>
        </div>
    </section>

    <script>
        const v = document.getElementById('vid'), s = document.getElementById('audGota'), l = document.getElementById('audLatido'), b = document.getElementById('btnDioses');
        
        // El latido empieza solo si ya funciona en tu versión
        l.play().catch(() => {});

        function activar() { v.style.opacity = "1"; v.play(); s.play().catch(() => {}); }
        function desactivar() { v.style.opacity = "0"; v.pause(); s.pause(); s.currentTime = 0; }

        b.onmouseenter = activar; b.onmouseleave = desactivar;
        b.ontouchstart = (e) => { e.preventDefault(); activar(); };
        b.ontouchend = desactivar;
    </script>
</body>
</html>
