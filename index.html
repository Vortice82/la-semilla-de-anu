<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La semilla de Anu – Volumen I: Anunaki</title>
  <style>
    :root{ --gold:#d4a017; --bg:#121212; --card:#1e1e1e; --text:#fff; --muted:#aaa; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; }
    .wrapper{ width:92%; max-width:600px; padding:22px 18px 34px; text-align:center; }
    h1{ color:var(--gold); margin:6px 0; font-size:1.9rem; }
    .autor{ color:var(--muted); margin:0 0 18px; }
    .media{ margin-bottom:18px; }
    .portada{
      display:block; width:100%; height:auto;
      border-radius:10px; border:2px solid var(--gold);
      box-shadow:0 0 20px rgba(212,160,23,.3);
      background:transparent;
    }
    .caja{ background:var(--card); padding:16px; border-radius:10px; border-bottom:3px solid var(--gold); text-align:left; }
    .caja h2{ margin:0 0 8px; color:var(--gold); font-size:1.18rem; }
    .caja p{ margin:0; line-height:1.55; font-size:.98rem; }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>La semilla de Anu</h1>
    <p class="autor">Volumen 1: Anunaki<br>por David Robles Asuncion</p>

    <div class="media">
      <!-- ⬇⬇⬇ DEJA SOLO UNA de estas dos líneas, según tu nombre de archivo -->
      <!-- Opción A -->
      <img src="portada.png" alt="Portada del libro La semilla de Anu (Volumen I: Anunaki)" class="portada">
      <!-- Opción B -->
      <!-- <img src="portada.png.png" alt="Portada del libro La semilla de Anu (Volumen I: Anunaki)" class="portada"> -->
    </div>

    <section class="caja" aria-labelledby="sinopsis">
      <h2 id="sinopsis">Sinopsis</h2>
      <p>Descubre los secretos ancestrales de los Anunaki en esta apasionante obra. Un viaje a través del tiempo y el conocimiento que cambiará tu forma de ver la historia.</p>
    </section>
  </div>
</body>
</html>
