<style>
    /* ... (El resto igual, pero busca estas clases para sustituirlas) ... */

    /* 2. CONTENEDOR DE PORTADA MEJORADO PARA MÓVIL */
    .web-container {
        position: relative;
        width: 100%;
        max-width: 500px; /* Tamaño ideal para que no se vea gigante en PC */
        margin: 15px auto;
        display: block; /* Cambiado de flex a block para evitar recortes */
        box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        border: 1px solid #4a3b2c;
        overflow: hidden;
    }

    .background-design {
        width: 100%;
        height: auto;
        display: block;
        /* Quitamos el max-height para que en móvil mande el ancho */
    }

    .botones-capa {
        position: absolute;
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%;
        /* Ahora los botones se moverán exactamente con la imagen */
    }

    /* AJUSTES PARA MÓVIL (EVITAR RECORTE DERECHO) */
    @media (max-width: 600px) {
        .web-container {
            width: 94vw; /* Dejamos un margen pequeño de seguridad */
            max-width: none;
            margin: 10px auto;
        }
        
        .btn-invisible {
            font-size: 0.55em; /* Tamaño de letra para que no desborde el botón */
            border-width: 1px;
        }
    }
</style>
