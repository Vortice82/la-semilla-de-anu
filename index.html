<!DOCTYPE html>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0d0a07; color: #e8dcc4; font-family: 'Cambria', serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .seo-title { color: #d4bc8c; padding: 30px 15px; font-size: clamp(1.5rem, 5vw, 2.5rem); text-transform: uppercase; text-align: center; letter-spacing: 5px; width: 100%; }
        
        /* Contenedor principal con altura mínima para que no colapse */
        .templo-master { 
            position: relative; 
            width: 98%; 
            max-width: 1250px; 
            min-height: 300px; 
            border: 2px solid #3d2b1f; 
            background: #000; 
            overflow: hidden; 
            line-height: 0; 
            z-index: 1; 
        }

        .background-design { width: 100%; height: auto; display: block; position: relative; z-index: 2; }
        
        /* Control de visibilidad de portadas */
        .img-pc { display: none; }
        @media (min-width: 850px) { 
            .img-pc { display: block; } 
            .img-movil { display: none; } 
        }
        @media (max-width: 849px) { 
            .img-movil { display: block; } 
        }

        /* Efectos visuales */
        .gota-efecto { position: absolute; top: -20px; left: 50%; width: 5px; height: 18px; background: rgba(212, 188, 140, 0.8); border-radius: 50%; z-index: 6; pointer-events: none; filter: blur(1px); animation: caerSuelo 3.5s infinite ease-in; }
        .onda-efecto { position: absolute; top: 96%; left: 50%; width: 10px; height: 5px; border: 2px solid rgba(212, 188, 140, 0.6); border-radius: 50%; z-index: 6; transform: translate(-50%, -50%); pointer-events: none; opacity: 0; filter: blur(1px); animation: ondaSuelo 3.5s infinite; }
        
        @keyframes caerSuelo { 0% { top: -20px; opacity: 0; } 30% { opacity: 1; } 90% { top: 96%; opacity: 1; } 91% { opacity: 0; } 100% { opacity: 0; } }
        @keyframes ondaSuelo { 0%, 90% { width: 0; height: 0; opacity: 0; } 91% { opacity: 1; } 100% { width: 300px; height: 80px; opacity: 0; } }

        #vid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.3s ease-in-out; }
        
        /* Capa de botones */
        .botones-capa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .btn-invisible { position: absolute; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; font-size: clamp(0.45rem, 1.7vw, 0.95rem); text-transform: uppercase; border-radius: 3px; text-align: center; width: 24%; height: 6.8%; transition: transform 0.2s; border: 1.5px solid rgba(255,255,255,0.2); color: #fff; }
        
        /* Posiciones */
        .btn-col-izq { left: 8.5%; }
        .btn-escritura { top: 32.5%; background: rgba(60, 40, 30, 0.95); border-color: #d4bc8c; } 
        .btn-aventura { top: 40.5%; background: rgba(30, 50, 40, 0.95); border-color: #88ccaa; } 
        .btn-oraculo { top: 48.5%; background: rgba(50, 30, 60, 0.95); border-color: #cc99ff; } 
        .btn-arcade { top: 56.5%; background: rgba(80, 20, 20, 0.95); border-color: #ff6666; } 
        .btn-dioses { top: 64.5%; background: rgba(20, 40, 80, 0.95); border-color: #66aaff; cursor: pointer; } 
        .btn-destino { top: 72.5%; background: rgba(139, 69, 19, 0.98); border-color: #ffd700; }

        .btn-col-der { left: 67.5%; }
        .btn-contacto-azul { top: 32.5%; background: #0044ff !important; border: 2px solid #00ffff !important; box-shadow: 0 0 15px #0044ff; }
        .btn-comprar { top: 40.5%; background: linear-gradient(145deg, #ffd700, #b8860b) !important; color: #000 !important; border: 2px solid #fff !important; font-weight: 900; animation: pulse 1.5s infinite alternate; }
        .btn-tiktok { top: 48.5%; background: rgba(0, 0, 0, 0.9); border: 1.5px solid #ff0050; } 
        .btn-instagram { top: 56.5%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border: 1.5px solid #fff; } 
        .btn-youtube { top: 64.5%; background: #ff0000; border: 1.5px solid #fff; }
        .btn-otros { top: 72.5%; background: #2a2a2a !important; color: #d4bc8c !important; border: 1.5px solid #d4bc8c !important; font-style: italic; cursor: pointer; }

        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }

        /* Modal */
        .modal-pared { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; padding: 20px; }
        .contenido-pared { background: #1a1612; background-image: radial-gradient(circle, #2a2218 0%, #0d0a07 100%); border: 4px solid #3d2b1f; padding: 30px; overflow-y: auto; max-height: 80vh; width: 100%; max-width: 600px; text-align: center; border-radius: 5px; }
        .autor-item { color: #8c7a5b; padding: 5px; border-bottom: 1px solid rgba(61, 43, 31, 0.3); }

        /* Secciones inferiores */
        .contenedor-ofrenda { padding: 40px 0; text-align: center; width: 100%; }
        .btn-paypal-ofrenda img { max-width: 180px; width: 45%; height: auto; cursor: pointer; }
        .seccion-global { width: 100%; max-width: 950px; padding: 40px 20px; text-align: center; }
        .mapa-img { width: 100%; height: auto; border: 1px solid #3d2b1f; margin-bottom: 20px; }
    </style>
</head>
<body onclick="activarFondo()" ontouchstart="activarFondo()">

    <h1 class="seo-title">La Semilla de Anu</h1>

    <div class="templo-master">
        <img src="portada-movil.png" class="background-design img-movil" fetchpriority="high">

        <div class="gota-efecto"></div>
        <div class="onda-efecto"></div>
        
        <video id="vid" loop playsinline muted preload="none"><source src="video.mp4" type="video/mp4"></video>
        <audio id="audGota" preload="auto"><source src="sonido.mp3" type="audio/mpeg"></audio>
        <audio id="audLatido" loop preload="auto"><source src="latido.mp3" type="audio/mpeg"></audio>
        
        <nav class="botones-capa">

        </nav>

        <div class="contenido-pared">

                <img src="Gemini_Generated_Image_g6d4ytg6d4ytg6d4.jpg" alt="Ofrenda" loading="lazy">

    <section class="seccion-global">
        <img src="mapa.jpg" class="mapa-img" loading="lazy">
        <h2>🌍 ¡LA INVASIÓN YA ES GLOBAL!</h2>
        <p>Descubre la obra de <b>David Robles Asunción</b>.</p>
    </section>

    <script>
        const v = document.getElementById('vid'), sG = document.getElementById('audGota'), aL = document.getElementById('audLatido'), bD = document.getElementById('btnD');
        let audioIniciado = false;

        function activarFondo() { 
            if (!audioIniciado) { 
                aL.play().catch(() => {}); 
                audioIniciado = true; 
            } 
        }

        function toggleGota(ver) { 
            v.style.opacity = ver ? "1" : "0"; 
            if(ver) { v.setAttribute('preload', 'auto'); v.play(); sG.play().catch(() => {}); } 
            else { v.pause(); sG.pause(); sG.currentTime = 0; } 
        }

        function abrirPared() { document.getElementById('modalAutores').style.display = 'flex'; }

        bD.onmouseenter = () => toggleGota(true);
        bD.onmouseleave = () => toggleGota(false);
        bD.ontouchstart = (e) => { e.preventDefault(); activarFondo(); toggleGota(true); };
        bD.ontouchend = () => toggleGota(false);
    </script>
</body>
</html>
