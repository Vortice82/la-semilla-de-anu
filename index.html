<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>La Semilla de Anu - Sitio Oficial</title>

  <style>
    /* --------------------------
       Reset y base
    ---------------------------*/
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Evita scrolls laterales y verticales accidentales */
    }
    body {
      background: #2c221a; /* marrón oscuro de fondo */
      display: flex;
      justify-content: center; /* Centrado horizontal */
      align-items: center;    /* Centrado vertical */
      font-family: Cambria, Georgia, "Times New Roman", serif;
      color: #e8dcc4;
    }

    /* --------------------------
       Contenedor principal
       - Forzamos altura completa (100vh)
       - Proporción exacta de tu portada (2/3)
    ---------------------------*/
    .web-container {
      position: relative;
      /* --- CORRECCIÓN CLAVE --- */
      height: 100vh; /* Altura completa de la pantalla siempre */
      width: auto;   /* El ancho se calcula solo según aspect-ratio */
      aspect-ratio: 2 / 3; /* Proporción de portada (928x1238px o similar) */
      
      border-radius: 4px; /* Bordes más sutiles en móvil */
      box-shadow: 0 5px 15px rgba(0,0,0,0.45);
      background: #1f1812; /* color de reserva */
    }

    /* --------------------------
       Imagen de fondo/diseño
    ---------------------------*/
    .background-design {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover; /* Asegura que cubra todo el contenedor */
      image-rendering: auto;
    }

    /* --------------------------
       Capa interactiva encima de la imagen
    ---------------------------*/
    .botones-capa {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Botones (destacados y accesibles) */
    .btn-invisible {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;

      pointer-events: auto;
      user-select: none;
      text-decoration: none;

      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      /* Tipografía fluida que escala bien en móvil y PC */
      font-size: clamp(0.75rem, 1.3vh, 1rem); 

      color: #2c221a;
      /* Fondo semitransparente color pergamino claro para destacar */
      background-color: rgba(232, 220, 196, 0.9); 
      border: 1px solid #8e7a60; /* Borde bronce sutil */
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);

      transition: all .2s ease;
      padding-inline: 0.5em;
      line-height: 1.1;
    }

    /* Efectos hover/focus */
    .btn-invisible:hover,
    .btn-invisible:focus-visible {
      background-color: rgba(232, 220, 196, 1);
      border-color: #d4bc8c;
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
      outline: none;
    }

    /* --------------------------
       Posiciones de los botones
       Al forzar height: 100vh, estos porcentajes
       SIEMPRE son exactos respecto a los dibujos.
    ---------------------------*/
    .btn-comprar   { top: 12.5%; left: 69%; width: 22%; height: 6%; }
    .btn-tiktok    { top: 21.5%; left: 69%; width: 22%; height: 6%; }
    .btn-correo    { top: 30.5%; left: 69%; width: 22%; height: 6%; }
    .btn-instagram { top: 39.5%; left: 69%; width: 22%; height: 6%; }
    .btn-youtube   { top: 48.5%; left: 69%; width: 22%; height: 6%; }

    /* Ajuste para pantallas anchas (PC) */
    @media (min-width: 900px) {
      .web-container {
        width: auto;
        height: min(100vh, 900px * 1.5); /* Limita altura si la pantalla es muy grande */
        max-width: 900px;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      }
      .btn-invisible {
        font-size: clamp(0.8rem, 1.2vw, 1rem);
        padding-inline: 0.7em;
        border-width: 2px;
      }
    }

    /* Evitar "…" en móviles muy pequeños */
    @media (max-width: 400px) {
      .btn-invisible {
        font-size: 0.7rem;
        padding-inline: 0.4em;
      }
    }
  </style>
</head>

<body>
  <div class="web-container" role="main" aria-label="Portada La Semilla de Anu">

    <img
      src="portada.png"
      srcset="portada.png 1x, portada.png 2x" /* Reutilizo portada.png si no tienes @2x.jpg */
      alt="La Semilla de Anu - Diseño Oficial responsive"
      class="background-design"
      decoding="async"
      fetchpriority="high"
    />

    <div class="botones-capa" aria-hidden="false">

      <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/"
         class="btn-invisible btn-comprar" target="_blank" rel="noopener noreferrer">
         COMPRAR
      </a>

      <a href="https://www.tiktok.com/@vorticeverde82"
         class="btn-invisible btn-tiktok" target="_blank" rel="noopener noreferrer">
         TIKTOK
      </a>

      <a href="mailto:vortice_verde@hotmail.com"
         class="btn-invisible btn-correo">
         CONTACTO
      </a>

      <a href="https://www.instagram.com/vorticeverde82/"
         class="btn-invisible btn-instagram" target="_blank" rel="noopener noreferrer">
         INSTAGRAM
      </a>

      <a href="https://www.youtube.com/@DRobles82"
         class="btn-invisible btn-youtube" target="_blank" rel="noopener noreferrer">
         YOUTUBE
      </a>

    </div>
  </div>
</body>
</html>
