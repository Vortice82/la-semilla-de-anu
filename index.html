<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Semilla de Anu - Sitio Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            min-height: 100%; 
            background-color: #2c221a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Cambria', 'Georgia', serif;
            touch-action: manipulation;
        }

        /* 1. CORRECCIÓN DE IMAGEN PARA QUE NO SE RECORTE */
        .web-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Tamaño máximo sugerido para móviles/web */
            margin: 10px auto;
            line-height: 0; /* Elimina espacio extra bajo la imagen */
        }

        .background-design {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .botones-capa {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* 2. ESTILO DE BOTONES ADAPTATIVOS */
        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #2c221a; 
            font-weight: bold;
            font-size: 2.8vw; /* Tamaño de fuente relativo al ancho */
            text-transform: uppercase;
            background-color: rgba(232, 220, 196, 0.7); 
            border: 1px solid #8e7a60; 
            border-radius: 4px;
            cursor: pointer;
        }

        @media (min-width: 600px) { .btn-invisible { font-size: 14px; } }

        /* Posiciones exactas basadas en % */
        .btn-escritura { top: 12.5%; left: 9%; width: 22%; height: 6%; background-color: rgba(85, 60, 40, 0.9); color: #e8dcc4; }
        .btn-juego     { top: 20.5%; left: 9%; width: 22%; height: 6%; background-color: #d4bc8c; }
        
        .btn-comprar   { top: 12.5%; left: 69%; width: 22%; height: 6%; }
        .btn-tiktok    { top: 21.5%; left: 69%; width: 22%; height: 6%; }
        .btn-correo    { top: 30.5%; left: 69%; width: 22%; height: 6%; }
        .btn-instagram { top: 39.5%; left: 69%; width: 22%; height: 6%; }
        .btn-youtube   { top: 48.5%; left: 69%; width: 22%; height: 6%; }

        /* 3. MODAL DEL JUEGO */
        #game-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-canvas {
            background: #1a1a2e;
            border: 3px solid #d4bc8c;
            max-width: 95vw;
            max-height: 50vh;
        }

        .game-header { color: #d4bc8c; width: 100%; max-width: 480px; display: flex; justify-content: space-around; padding: 10px; font-size: 14px; }
        .game-footer { margin-top: 10px; display: flex; gap: 10px; }
        .game-btn { padding: 12px 20px; background: #d4bc8c; border: none; font-weight: bold; border-radius: 5px; }

        /* CONTROLES MÓVILES MEJORADOS */
        .mobile-controls {
            margin-top: 20px;
            display: flex; 
            gap: 40px;
        }
        .t-btn {
            width: 70px; height: 70px;
            background: rgba(212, 188, 140, 0.3);
            border: 2px solid #d4bc8c;
            border-radius: 50%;
            color: white; font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            user-select: none;
            touch-action: none; /* Importante para evitar scroll al jugar */
        }
    </style>
</head>
