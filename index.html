    <style>
        :root {
            --background-image-embedded: url('./portada.png');
            --main-font: 'Palatino Linotype','Book Antiqua',Palatino,serif;
            --text-color: #3e2723;
            --accent-color: #d7ccc8;
            --buy-button-bg: #8c7b60;
            --buy-button-text: #fff;
        }

        body {
            margin: 0;
            padding: 0;
            background-image: var(--background-image-embedded);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #000;
            background-attachment: fixed;
            font-family: var(--main-font);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .page-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1); /* Sutil capa para legibilidad */
            backdrop-filter: blur(5px);
        }

        /* DECORACIÓN IZQUIERDA */
        .sidebar-left {
            width: 8%;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            padding-top: 10%;
            pointer-events: none;
        }

        .decorations-column {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .decoration-eye {
            width: 30px;
            height: 30px;
            background-color: var(--text-color);
            border-radius: 50%;
        }

        .decoration-eye::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: #8c7b60;
            border-radius: 50%;
            display: block;
            margin: 10px auto 0 auto;
        }

        /* CONTENIDO CENTRAL */
        .main-content {
            width: 100%;
            padding: 60px 12% 100px 10%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            text-align: center;
            font-size: 2.2rem;
            text-transform: uppercase;
            background: rgba(215, 204, 200, 0.9);
            padding: 15px 40px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .sub-title {
            font-size: 1.2rem;
            display: block;
            margin-top: 5px;
            color: #5d4037;
        }

        .volume-card {
            width: 100%;
            max-width: 650px;
            margin-bottom: 50px;
            text-align: center;
        }

        .volume-label {
            background-color: rgba(215, 204, 200, 0.9);
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .status-badge {
            color: #795548;
            font-style: italic;
            margin-left: 10px;
        }

        .tablet-image {
            width: 100%;
            height: 350px;
            border-radius: 10px;
            border: 5px solid #8d6e63;
            background-image: url('./portada.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

            margin-top: 10px;
