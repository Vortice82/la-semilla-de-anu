<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La semilla de Anu – Volumen I: Anunaki</title>

  <meta name="description" content="La semilla de Anu (Volumen I: Anunaki) de David Robles Asuncion. Un viaje a través del tiempo y el conocimiento que cambiará tu forma de ver la historia.">

  <style>
    :root{
      --gold:#d4a017;
      --bg:#121212;
      --card:#1e1e1e;
      --text:#ffffff;
      --muted:#aaa;
      --muted2:#555;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      min-height:100svh;
      align-items:flex-start;
      justify-content:center;
    }
    .wrapper{
      width:92%;
      max-width:600px;
      padding:22px 18px 34px;
      text-align:center;
    }
    header h1{
      color:var(--gold);
      font-size:1.9rem;
      line-height:1.2;
      margin:6px 0 6px;
    }
    .autor{ color:var(--muted); margin:0 0 18px; }

    .media{ margin-bottom:18px; }
    .portada{
      display:block;
      width:100%;
      height:auto;           /* sin aspect-ratio para evitar “bloque negro” si no carga */
      border-radius:10px;
      border:2px solid var(--gold);
      box-shadow:0 0 20px rgba(212,160,23,.3);
      background:#000;       /* fallback discreto */
    }

    .caja{
      background:var(--card);
      padding:16px;
      border-radius:10px;
      border-bottom:3px solid var(--gold);
      text-align:left;
    }
    .caja h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:1.18rem;
    }
    .caja p{
      margin:0;
      line-height:1.55;
      font-size:.98rem;
    }

    .btn{
      display:block;
      margin:26px 0 0;
      padding:14px 16px;
      background:var(--gold);
      color:#000;
      text-decoration:none;
      font-weight:700;
      border-radius:8px;
      text-transform:uppercase;
      letter-spacing:.06em;
