<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Semilla de Anu - Sitio Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #2c221a; 
            color: #e8dcc4;
            font-family: 'Cambria', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* PORTADA */
        .main-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 10px 0;
        }

        .portada-img { width: 100%; height: auto; display: block; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }

        .btn {
            position: absolute;
            background: rgba(232, 220, 196, 0.85);
            border: 1px solid #8e7a60;
            border-radius: 4px;
            color: #2c221a;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            text-transform: uppercase;
        }

        .btn-escritura { top: 12.5%; left: 8%; width: 25%; height: 6%; background: #553c28; color: #fff; }
        .btn-juego     { top: 20.5%; left: 8%; width: 25%; height: 6%; background: #d4bc8c; }
        .btn-comprar   { top: 12.5%; left: 67%; width: 25%; height: 6%; }
        .btn-tiktok    { top: 21.5%; left: 67%; width: 25%; height: 6%; }
        .btn-correo    { top: 30.5%; left: 67%; width: 25%; height: 6%; }
        .btn-instagram { top: 39.5%; left: 67%; width: 25%; height: 6%; }
        .btn-youtube   { top: 48.5%; left: 67%; width: 25%; height: 6%; }

        /* SECCIÓN MAPA Y TEXTO */
        .seccion-inferior {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        .mapa-img { width: 100%; height: auto; border: 1px solid #d4bc8c; margin-bottom: 20px; }

        .texto-descripcion {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #d4bc8c;
        }

        /* JUEGO MODAL */
        #game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        canvas { background: #000; border: 2px solid #d4bc8c; max-width: 95vw; }
        
        .controls { margin-top: 15px; display: flex; gap: 30px; }
        .t-btn {
            width: 70px; height: 70px;
            background: rgba(212, 188, 140, 0.2);
            border: 2px solid #d4bc8c;
            border-radius: 50%;
            color: white; font-size: 25px;
            display: flex; align-items: center; justify-content: center;
            touch-action: none;
        }

        /* SUGERENCIAS DENTRO DEL JUEGO */
        #sugerencias-juego {
            display: none;
            width: 100%;
            max-width: 360px;
            margin-top: 15px;
            text-align: center;
        }

        #sugerencia-input {
            width: 100%; padding: 10px; border-radius: 4px; border: none; margin-bottom: 10px;
        }

        .btn-juego-ui { padding: 10px 15px; background: #d4bc8c; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="portada.png" class="portada-img">
        <div class="botones-overlay">
            <a href="cuneiforme.html" class="btn btn-escritura">ESCRITURA</a>
            <div class="btn btn-juego" onclick="openGame()">JUEGO</div>
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn btn-comprar" target="_blank">COMPRAR</a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn btn-tiktok" target="_blank">TIKTOK</a>
            <a href="mailto:vortice_verde@hotmail.com" class="btn btn-correo">CONTACTO</a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn btn-instagram" target="_blank">INSTAGRAM</a>
            <a href="https://www.youtube.com/@DRobles82" class="btn btn-youtube" target="_blank">YOUTUBE</a>
        </div>
    </div>

    <div class="seccion-inferior">
        <img src="mapa.jpg" class="mapa-img">
        <div class="texto-descripcion">
            <p>Explora el misterio de los Anunaki. Disponible en más de 11 países. No olvides incluir <b>"La Semilla de Anu"</b> de David Robles en tu lista de lectura esencial.</p>
        </div>
    </div>

    <div id="game-screen">
        <canvas id="gameCanvas"></canvas>
        
        <div id="controles-juego">
            <div class="controls">
                <div class="t-btn" id="l-btn">◀</div>
                <div class="t-btn" id="r-btn">▶</div>
            </div>
            <button class="btn-juego-ui" onclick="closeGame()">SALIR</button>
        </div>

        <div id="sugerencias-juego">
            <h3 style="color:#d4bc8c; margin-bottom:10px;">¡Sugerencia para los Anunaki!</h3>
            <input type="text" id="sugerencia-input" placeholder="Escribe aquí tu mensaje...">
            <button class="btn-juego-ui" onclick="enviarSugerencia()">ENVIAR MENSAJE</button>
            <button class="btn-juego-ui" style="background:#8e7a60; color:white;" onclick="reiniciarJuego()">REINTENTAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 360; canvas.height = 400;

        let x, y, dx, dy, paddleX, gameActive = false;
        let bricks = [];
        let leftP = false, rightP = false;

        function openGame() {
            document.getElementById("game-screen").style.display = "flex";
            document.getElementById("sugerencias-juego").style.display = "none";
            document.getElementById("controles-juego").style.display = "block";
            reiniciarJuego();
        }

        function closeGame() {
            document.getElementById("game-screen").style.display = "none";
            gameActive = false;
        }

        function reiniciarJuego() {
            x = canvas.width/2; y = canvas.height-30;
            dx = 3; dy = -3;
            paddleX = (canvas.width-80)/2;
            bricks = [];
            for(let c=0; c<5; c++) {
                bricks[c] = [];
                for(let r=0; r<4; r++) bricks[c][r] = { x:0, y:0, status:1 };
            }
            document.getElementById("sugerencias-juego").style.display = "none";
            document.getElementById("controles-juego").style.display = "block";
            gameActive = true;
            run();
        }

        // Táctiles
        const lb = document.getElementById("l-btn");
        const rb = document.getElementById("r-btn");
        lb.ontouchstart = (e) => { e.preventDefault(); leftP = true; };
        lb.ontouchend = () => leftP = false;
        rb.ontouchstart = (e) => { e.preventDefault(); rightP = true; };
        rb.ontouchend = () => rightP = false;

        function run() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Bloques (Tablillas)
            for(let c=0; c<5; c++) {
                for(let r=0; r<4; r++) {
                    let b = bricks[c][r];
                    if(b.status == 1) {
                        b.x = c*(65+5)+10; b.y = r*(20+5)+40;
                        ctx.fillStyle = "#a67b5b"; ctx.fillRect(b.x, b.y, 65, 20);
                        ctx.strokeStyle = "#4e3b31"; ctx.strokeRect(b.x, b.y, 65, 20);
                        if(x > b.x && x < b.x+65 && y > b.y && y < b.y+20) { dy=-dy; b.status=0; }
                    }
                }
            }

            // Pelota y Pala
            ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fillStyle="#ff8c00"; ctx.fill(); ctx.closePath();
            ctx.fillStyle="#003399"; ctx.fillRect(paddleX, canvas.height-15, 80, 10);

            if(x+dx > canvas.width-8 || x+dx < 8) dx=-dx;
            if(y+dy < 8) dy=-dy;
            else if(y+dy > canvas.height-15) {
                if(x > paddleX && x < paddleX+80) dy=-dy;
                else { 
                    gameActive = false;
                    document.getElementById("controles-juego").style.display = "none";
                    document.getElementById("sugerencias-juego").style.display = "block";
                }
            }

            if(leftP && paddleX > 0) paddleX -= 6;
            if(rightP && paddleX < canvas.width-80) paddleX += 6;

            x+=dx; y+=dy;
            requestAnimationFrame(run);
        }

        function enviarSugerencia() {
            const val = document.getElementById("sugerencia-input").value;
            if(val) {
                alert("Mensaje enviado: " + val);
                document.getElementById("sugerencia-input").value = "";
                closeGame();
            }
        }
    </script>
</body>
</html>
