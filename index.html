<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - Volumen I: Anunaki (Web Oficial)</title>
    <style>
        /* --- ESTILOS GENERALES Y RESETS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            background-color: #2c221a; /* Fondo oscuro de madera */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita barras de desplazamiento */
            font-family: sans-serif;
        }

        /* Contenedor principal para la imagen y los botones invisibles */
        #container_general {
            position: relative;
            height: 100vh;
            width: auto;
            aspect-ratio: 928 / 1238; /* Proporción exacta de tu imagen (928x1238px) */
            display: flex;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        /* Tu imagen de portada original ocupando el 100% de alto */
        #portada_imagen {
            height: 100%;
            width: auto;
            display: block;
            border-radius: 4px;
        }

        /* Capa transparente que cubre la imagen para poner los botones */
        #capa_botones_invisibles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Estilo común de todos los botones invisibles */
        .boton_invisible {
            position: absolute;
            display: block;
            text-decoration: none;
            outline: none; /* Elimina borde de enfoque */
            /* background: rgba(255, 0, 0, 0.2); */ /* DESCOMENTA ESTA LÍNEA PARA VER LOS BOTONES Y AJUSTAR */
        }

        /* --- POSICIÓN DE TUS BOTONES DISEÑADOS (en porcentaje) --- */
        
        /* Columna derecha (Redes) */
        .btn_comprar { top: 12%; left: 66%; width: 23%; height: 6.5%; }
        .btn_tiktok  { top: 20%; left: 66%; width: 23%; height: 6.5%; }
        .btn_correo  { top: 28%; left: 66%; width: 23%; height: 6.5%; }
        .btn_insta   { top: 36%; left: 66%; width: 23%; height: 6.5%; }
        .btn_youtube { top: 44%; left: 66%; width: 23%; height: 6.5%; }

        /* Botón de Volumen I (Abajo) */
        .btn_volumen1 { top: 62.5%; left: 24.5%; width: 51%; height: 7%; }

        /* Ajustes para móviles */
        @media (max-width: 600px) {
            #container_general {
                width: 100vw;
                height: auto;
                aspect-ratio: 928 / 1238;
            }
            #portada_imagen {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div id="container_general">

        <img src="portada.png" alt="La Semilla de Anu - Diseño Oficial" id="portada_imagen">

        <div id="capa_botones_invisibles">
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="boton_invisible btn_comprar" target="_blank" rel="noopener noreferrer"></a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="boton_invisible btn_tiktok" target="_blank" rel="noopener noreferrer"></a>
            <a href="mailto:vortice_verde@hotmail.com" class="boton_invisible btn_correo"></a>
            <a href="https://www.instagram.com/vorticeverde82/" class="boton_invisible btn_insta" target="_blank" rel="noopener noreferrer"></a>
            <a href="https://www.youtube.com/@DRobles82" class="boton_invisible btn_youtube" target="_blank" rel="noopener noreferrer"></a>
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="boton_invisible btn_volumen1" target="_blank" rel="noopener noreferrer"></a>
        </div>

    </div>

</body>
</html>
