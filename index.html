<html lang="es">

  <style>
    :root{
      --gold:#d4a017;
      --bg:#121212;
      --card:#1e1e1e;
      --text:#ffffff;
      --muted:#aaa;
      --muted2:#555;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      min-height:100vh;
    }
    .wrapper{
      width:92%;
      max-width:600px;
      padding:22px 18px 34px;
      text-align:center;
    }
    h1{
      color:var(--gold);
      margin:6px 0 6px;
      font-size:1.9rem;
      line-height:1.2;
    }
    .autor{
      color:var(--muted);
      margin:0 0 18px;
    }
    .media{ margin-bottom:18px; }
    .portada{
      display:block;
      width:100%;
      height:auto;
      border-radius:10px;
      border:2px solid var(--gold);
      box-shadow:0 0 20px rgba(212,160,23,.3);
      background:#000; /* fallback discreto */
    }
    .caja{
      background:var(--card);
      padding:16px;
      border-radius:10px;
      border-bottom:3px solid var(--gold);
      text-align:left;
    }
    .caja h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:1.18rem;
    }
