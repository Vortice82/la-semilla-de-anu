<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - Vórtice Verde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- VARIABLES Y CONFIGURACIÓN --- */
        :root {
            /* --- !!! PASO IMPORTANTE !!! --- */
            /* PEGA AQUÍ TU CÓDIGO BASE64 COMPLETO DENTRO DE LAS COMILLAS SIMPLES */
            /* DEBE EMPEZAR CON 'data:image/...' Y TERMINAR EN LA COMILLA SIMPLE */
            --background-image-embedded: url('TU_CODIGO_BASE64_AQUÍ'); 
            /* ---------------------------------- */

            --main-font: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            --text-color: #3e2723; /* Marrón oscuro para simular tinta antigua */
            --accent-color: #d7ccc8; /* Beige claro para fondos de texto */
            --buy-button-bg: #8c7b60; /* Color del botón de compra */
            --buy-button-text: #fff;
        }

        /* --- ESTILOS GENERALES Y FONDO --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #d2b48c; /* Color de respaldo si la imagen falla */
            background-image: var(--background-image-embedded);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: var(--main-font);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- CONTENEDOR PRINCIPAL CENTRAL --- */
        .page-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            position: relative;
        }

        /* --- BARRA LATERAL IZQUIERDA (Decorativa) --- */
        .sidebar-left {
            width: 8%; /* Ajustado para que la decoración de enredaderas no coma mucho espacio */
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            padding-top: 10%;
        }
        /* Esta parte simula la columna de "ojos" y enredaderas de tu imagen */
        .decorations-column {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .decoration-eye {
            width: 30px;
            height: 30px;
            background-color: var(--text-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .decoration-eye::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: #8c7b60;
            border-radius: 50%;
        }

        /* --- CONTENIDO CENTRAL --- */
        .main-content {
            width: 100%;
            padding-left: 10%; /* Espacio para la barra decorativa */
            padding-right: 12%; /* Espacio para el menú lateral derecho */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            padding-bottom: 100px;
        }

        /* Títulos */
        .main-title {
            text-align: center;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(215, 204, 200, 0.9); /* var(--accent-color) con opacidad */
            padding: 10px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .main-title .sub-title {
            display: block;
            font-size: 1.4rem;
            text-transform: none;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* --- MENÚ LATERAL DERECHO CON ICONOS --- */
        .sidebar-right {
            width: 10%;
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding-top: 20px;
        }
        .nav-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            background: rgba(215, 204, 200, 0.9); /* var(--accent-color) con opacidad */
            border: 2px solid var(--text-color);
            border-radius: 5px;
            color: var(--text-color);
            font-size: 1.8rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }
        .nav-icon:hover {
            background-color: var(--buy-button-bg);
            color: var(--buy-button-text);
            transform: scale(1.1);
        }
        /* Iconos oficiales específicos */
        .fa-youtube { color: #f00 !important; }
        .nav-icon:hover .fa-youtube { color: #fff !important; }
        
        .fa-tiktok { color: #000 !important; }
        .nav-icon:hover .fa-tiktok { color: #fff !important; }

        .fa-envelope { color: #555 !important; }
        .nav-icon:hover .fa-envelope { color: #fff !important; }

        /* --- ESTRUCTURA DE VOLÚMENES --- */
        .volume-card {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            position: relative;
        }

        /* Etiquetas de "Volumen X" */
        .volume-label-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 10px;
            margin-bottom: 10px;
        }
        .volume-label {
            background-color: rgba(215, 204, 200, 0.9); /* var(--accent-color) con opacidad */
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            margin-left: -20px; /* Un poco de sangría para que parezca que sale de la enredadera */
        }
        .status-badge {
            font-style: italic;
            color: #795548;
            font-size: 0.9rem;
        }

        /* La tablilla de arcilla (Cuneiforme) */
        .tablet-image {
            width: 100%;
            border-radius: 10px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.6);
            border: 5px solid #8d6e63; /* Borde de arcilla */
        }

        /* --- BOTÓN DE COMPRA --- */
        .buy-button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }
        .buy-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--buy-button-bg);
            color: var(--buy-button-text);
            text-decoration: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }
        .buy-button:hover {
            background-color: #6d5d47; /* Tono más oscuro al hover */
            transform: translateY(-3px);
            box-shadow: 5px 5px 10px rgba(0,0,0,0.6);
        }

        /* --- RESPONSIVIDAD BÁSICA (Móviles) --- */
        @media (max-width: 768px) {
            .page-container {
                flex-direction: column;
                max-width: none;
                padding-right: 0;
                padding-left: 0;
            }
            .sidebar-left, .decorations-column {
                display: none; /* Quitamos la decoración enredadera en móvil para dar espacio */
            }
            .main-content {
                width: 90%;
                margin: 0 auto;
                padding: 30px 15px 100px;
            }
            .sidebar-right {
                width: 100%;
                position: fixed;
                bottom: 0;
                top: auto;
                flex-direction: row;
                justify-content: space-evenly;
                background-color: rgba(255,255,255,0.9);
                border-top: 2px solid var(--text-color);
                padding: 10px;
                height: auto;
                z-index: 1000;
            }
            .nav-icon {
                width: 45px;
                height: 45px;
                font-size: 1.5rem;
            }
            .main-title {
                font-size: 1.8rem;
                width: 90%;
                box-sizing: border-box;
            }
            .main-title .sub-title {
                font-size: 1.2rem;
            }
            .volume-label {
                margin-left: 0;
            }
            .status-badge {
                position: absolute;
                top: 0;
                right: 0;
                background: rgba(215, 204, 200, 0.9); /* var(--accent-color) con opacidad */
                padding: 2px 5px;
                border-radius: 3px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div class="sidebar-left">
            <div class="decorations-column">
                <div class="decoration-eye"></div>
                <div class="decoration-eye"></div>
                <div class="decoration-eye"></div>
                <div class="decoration-eye"></div>
                <div class="decoration-eye"></div>
                <div class="decoration-eye"></div>
            </div>
        </div>

        <div class="main-content">
            
            <div class="main-title">
                LA SEMILLA DE ANU:
                <span class="sub-title">Volumen I: Anunaki</span>
            </div>

            <div class="volume-card">
                <div class="volume-label-container">
                    <span class="volume-label">Volumen I</span>
                </div>
                <div class="tablet-image" style="background-color: #c19a6b; color: white; height: 300px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; text-align: center;">Tablilla Cuneiforme<br>Volumen I</div>
                
                <div class="buy-button-container">
                    <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" target="_blank" class="buy-button">
                        <i class="fas fa-shopping-cart"></i> Comprar Libro Oficial
                    </a>
                </div>
            </div>

            <div class="volume-card">
                <div class="volume-label-container">
                    <span class="volume-label">Volumen II</span>
                    <span class="status-badge">Proximamente</span>
                </div>
                <div class="tablet-image" style="background-color: #a1887f; color: white; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; text-align: center;">Tablilla Cuneiforme<br>Volumen II</div>
            </div>

            <div class="volume-card">
                <div class="volume-label-container">
                    <span class="volume-label">Volumen III</span>
                    <span class="status-badge">En proceso</span>
                </div>
                <div class="tablet-image" style="background-color: #8d6e63; color: white; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; text-align: center;">Tablilla Cuneiforme<br>Volumen III</div>
            </div>

        </div>

        <nav class="sidebar-right">
            <a href="#" class="nav-icon" title="Menu"><i class="fas fa-bars"></i></a>
            <a href="#" class="nav-icon" title="Home"><i class="fas fa-home"></i></a>
            <a href="#" class="nav-icon" title="Scroll"><i class="fas fa-scroll"></i></a>
            <a href="#" class="nav-icon" title="Galería"><i class="fas fa-image"></i></a>
            
            <hr style="width: 80%; border: 1px solid var(--text-color); margin: 10px 0;">
            
            <a href="mailto:vortice_verde@hotmail.com" class="nav-icon" title="Email"><i class="fas fa-envelope"></i></a>
            <a href="https://www.tiktok.com/@vorticeverde82" target="_blank" class="nav-icon" title="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@DRobles82" target="_blank" class="nav-icon" title="YouTube"><i class="fab fa-youtube"></i></a>
        </nav>

    </div>

</body>
</html>
