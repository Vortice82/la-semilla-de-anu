<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - Web Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; 
            background-color: #2c221a; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
        }

        /* El contenedor tiene el tamaño de tu imagen original */
        .web-container {
            position: relative;
            height: 100vh;
            width: auto;
            aspect-ratio: 928 / 1238; /* Proporción exacta de tu imagen */
            display: flex;
            justify-content: center;
        }

        /* Tu imagen ocupando todo el fondo */
        .background-design {
            height: 100%;
            width: auto;
            display: block;
        }

        /* Capa de botones invisibles */
        .botones-capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Estilo común de los botones (transparentes) */
        .btn-invisible {
            position: absolute;
            display: block;
            text-decoration: none;
            /* background: rgba(255, 0, 0, 0.2); */ /* DESCOMENTA ESTA LÍNEA SI QUIERES VER DÓNDE ESTÁN LOS BOTONES PARA AJUSTAR */
        }

        /* --- POSICIONES DE TUS BOTONES (EN PORCENTAJE) --- */
        
        /* Botones de la columna derecha (Redes) */
        .btn-comprar   { top: 12%; left: 66%; width: 23%; height: 6%; }
        .btn-tiktok    { top: 20%; left: 66%; width: 23%; height: 6%; }
        .btn-correo    { top: 28%; left: 66%; width: 23%; height: 6%; }
        .btn-instagram { top: 36%; left: 66%; width: 23%; height: 6%; }
        .btn-youtube   { top: 44%; left: 66%; width: 23%; height: 6%; }

        /* Botón de Volumen I (Abajo) */
        .btn-volumen1  { top: 62%; left: 24%; width: 52%; height: 7%; }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            .web-container { width: 100vw; height: auto; aspect-ratio: 928 / 1238; }
            .background-design { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <div class="web-container">
        <img src="portada.png" class="background-design" alt="La Semilla de Anu">

        <div class="botones-capa">
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-comprar" target="_blank"></a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-tiktok" target="_blank"></a>
            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-correo"></a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-instagram" target="_blank"></a>
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-youtube" target="_blank"></a>
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-volumen1" target="_blank"></a>
        </div>
    </div>

</body>
</html>
