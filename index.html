<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - Volumen I: Anunaki (Página Oficial)</title>
    <style>
        /* --- ESTILOS DE FONDO Y PÁGINA --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita barras de desplazamiento */
            background: #2c221a; /* Fondo oscuro detrás del diseño */
            font-family: 'Cambria', 'Georgia', serif; /* Tipografía de estilo antiguo */
            display: flex;
            justify-content: center; /* Centra el contenido si la pantalla es muy ancha */
            align-items: center;
        }

        /* --- CONTENEDOR PRINCIPAL QUE SE AJUSTA A LA PANTALLA --- */
        #site_container {
            position: relative;
            height: 100vh; /* Ocupa el 100% de la altura de la ventana */
            width: auto;
            aspect-ratio: 928 / 1238; /* Proporción exacta de tu imagen (928x1238px) */
            background-image: url('portada.png'); /* Usa tu diseño original como fondo */
            background-size: cover; /* Asegura que la imagen cubra todo el contenedor */
            background-position: center; /* Centra la imagen */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Sombra decorativa */
        }

        /* --- BARRA LATERAL DE BOTONES NUEVOS --- */
        #botones_bar {
            position: absolute;
            top: 15%; /* Posiciona la barra verticalmente */
            right: 15px; /* Margen derecho */
            width: 200px; /* Ancho de la barra de botones */
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaciado entre botones */
            padding: 20px;
            background: rgba(232, 220, 196, 0.2); /* Sutil fondo transparente de pergamino */
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10; /* Asegura que esté encima de todo */
        }

        /* --- ESTILOS DE LOS BOTONES --- */
        .btn-interactivo {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 25px; /* Bordes muy redondeados */
            text-decoration: none;
            color: #e8dcc4; /* Texto color crema claro */
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease; /* Efectos suaves */
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        /* Icono SVG dentro del botón */
        .btn-interactivo svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* Efecto al pasar el ratón (Hover) */
        .btn-interactivo:hover {
            transform: translateY(-2px) scale(1.03); /* Levanta y agranda un poco */
            box-shadow: 0 6px 15px rgba(255, 255, 255, 0.2);
            color: #fff; /* Texto blanco puro */
        }

        /* Efecto de brillo de borde al pasar el ratón */
        .btn-interactivo::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-interactivo:hover::after {
            opacity: 1;
        }

        /* --- COLORES ESPECÍFICOS DE LOS 5 BOTONES --- */
        
        /* 1. COMPRAR (Bronce/Verde) */
        .btn-comprar {
            background: linear-gradient(to right, #7d5e4a, #a38c6c);
            border-color: rgba(163, 140, 108, 0.6);
        }

        /* 2. TIKTOK (Azul) */
        .btn-tiktok {
            background: linear-gradient(to right, #4f798e, #2d4c5c);
            border-color: rgba(45, 76, 92, 0.6);
        }

        /* 3. CORREO (Gris) */
        .btn-correo {
            background: linear-gradient(to right, #7a7a7a, #4a4a4a);
            border-color: rgba(74, 74, 74, 0.6);
        }

        /* 4. INSTAGRAM (Púrpura) */
        .btn-insta {
            background: linear-gradient(to right, #744365, #431f37);
            border-color: rgba(67, 31, 55, 0.6);
        }

        /* 5. YOUTUBE (Rojo) */
        .btn-youtube {
            background: linear-gradient(to right, #8f4b4b, #5c2d2d);
            border-color: rgba(92, 45, 45, 0.6);
        }

        /* --- AJUSTES PARA MÓVILES (Hacerlo Responsive)
