<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - David Robles</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
        }

        /* --- CONTENEDOR DE PORTADA --- */
        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('portada-pc.png') no-repeat center center;
            background-size: cover;
            padding: 20px;
        }

        /* Degradado para que no se vea "todo marrón" y la imagen respire */
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .contenido-hero {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px; /* Más estrecho para que se vea más la portada lateral */
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        /* --- VENTANA DE CONTACTO (ESTILO CRISTAL OSCURO) --- */
        .tablilla-contacto {
            background: rgba(20, 20, 20, 0.8); /* Fondo casi negro translúcido */
            backdrop-filter: blur(8px); /* Efecto de desenfoque muy moderno */
            border: 1px solid rgba(212, 175, 55, 0.3); /* Borde fino dorado */
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .tablilla-contacto h3 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-size: 1rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #fff;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 5px;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-enviar {
            width: 100%;
            background: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 10px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-enviar:hover {
            background: #d4af37;
            color: #000;
        }

        /* --- BOTÓN COMPRAR (EL QUE TIENE QUE RESALTAR) --- */
        .btn-comprar {
            display: block;
            width: 100%;
            background: #d4af37;
            color: #000 !important;
            padding: 20px;
            text-decoration: none;
            font-weight: 800;
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            transition: transform 0.2s;
        }

        .btn-comprar:hover {
            transform: scale(1.02);
            background: #fff;
        }

        /* --- RESPONSIVE MÓVIL --- */
        @media (max-width: 480px) {
            .hero {
                background-image: url('portada-movil.png');
                padding: 15px;
                align-items: flex-start; /* Sube todo arriba para que se vea el botón */
                padding-top: 50px;
            }
            h1 { font-size: 1.8rem; }
            .tablilla-contacto { padding: 15px; }
            .btn-comprar { padding: 15px; font-size: 1rem; }
        }

        /* --- SECCIÓN INFERIOR --- */
        .librerias {
            background: #000;
            padding: 50px 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="contenido-hero">
            <h1>LA SEMILLA DE ANU</h1>
            
            <div class="tablilla-contacto">
                <h3>CONTACTO CON EL AUTOR</h3>
                <form action="https://formspree.io/f/TU_ID" method="POST">
                    <input type="email" name="email" placeholder="Tu e-mail" required>
                    <textarea name="mensaje" rows="2" placeholder="Tu mensaje..." required></textarea>
                    <button type="submit" class="btn-enviar">ENVIAR MENSAJE</button>
                </form>
            </div>

            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-comprar">
                🛒 COMPRAR LIBRO AHORA
            </a>
        </div>
    </div>

    <section class="librerias">
        <p style="color: #666; margin-bottom: 20px;">Disponible en librerías de todo el mundo</p>
        <img src="mapa.jpg" alt="Mapa" style="max-width: 100%; opacity: 0.6; border-radius: 10px;">
    </section>

</body>
</html>
