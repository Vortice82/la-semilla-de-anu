        .contenedor-anunaki {

        }

        .tablilla-contacto {
            background-color: #3d3329;
            background-image: url('https://www.transparenttextures.com/patterns/rock.png');

            border-radius: 8px;
            padding: 25px;
            box-shadow: inset 0 0 20px #000, 0 10px 20px rgba(0,0,0,0.5);
            width: 100%;
            box-sizing: border-box;
        }

        .tablilla-contacto h3 {
            color: #d4af37;
            font-family: 'Cinzel', serif;
            margin-top: 0;
        }

        .tablilla-contacto input, .tablilla-contacto textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #5c4d3d;
            color: #e0d0b0;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 3px;
            box-sizing: border-box;
        }

        .btn-enviar {
            width: 100%;
            background: linear-gradient(to bottom, #8b4513, #5d2e0d);
            color: white;
            border: 1px solid #261e18;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-comprar {
            display: block;
            width: 100%;
            background: #d4af37;
            color: #000 !important;
            padding: 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
        }

        /* Redes Sociales */

            margin: 40px 0;
        }

        .redes a {
            color: #fff;

            text-decoration: none;
