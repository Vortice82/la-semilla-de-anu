<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- Mantengo el meta viewport pero dejo el zoom del usuario habilitado -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La Semilla de Anu - Sitio Oficial</title>

  <style>
    /* --------------------------
       Reset y base
    ---------------------------*/
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      /* IMPORTANTE: no bloqueamos el scroll.
         En móviles con barras/notch, forzar sin scroll puede recortar. */
      overflow-x: hidden;
      overflow-y: auto;
    }
    body {
      background: #2c221a; /* marrón oscuro de fondo */
      display: flex;
      justify-content: center; /* Centrado horizontal */
      align-items: center;    /* Centrado vertical */
      font-family: Cambria, Georgia, "Times New Roman", serif;
      color: #e8dcc4;
      min-height: 100dvh;     /* viewport dinámico para móviles modernos */
    }

    /* --------------------------
       Contenedor principal
       - Altura "a pantalla" con dvh (fallback a vh)
       - Proporción 2/3
    ---------------------------*/
    .web-container {
      position: relative;
      height: 96dvh;                 /* usa viewport dinámico */
      aspect-ratio: 2 / 3;           /* proporción de la portada */
      width: auto;                   /* el ancho sale de la proporción */
      max-width: min(96vw, 900px);   /* límites para que no se dispare en PC */
      border-radius: 4px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.45);
      background: #1f1812;
      display: grid;                 /* para poder aplicar padding sin romper la capa */
      place-items: center;
      padding-inline: 0;             /* se modificará en móvil para "alejar" la portada */
      overflow: hidden;
    }
    @supports not (height: 100dvh) {
      .web-container { height: 96vh; }
    }

    /* --------------------------
       Imagen de fondo/diseño
    ---------------------------*/
    .background-design {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover; /* En escritorio queda perfecto llenando el marco */
      object-position: center;
      image-rendering: auto;
    }

    /* --------------------------
       Capa interactiva encima de la imagen
    ---------------------------*/
    .botones-capa {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Botones (destacados y accesibles) */
    .btn-invisible {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;

      pointer-events: auto;
      user-select: none;
      text-decoration: none;

      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      /* Tipografía fluida que escala bien en móvil y PC */
      font-size: clamp(0.75rem, 1.3vh, 1rem);

      color: #2c221a;
      background-color: rgba(232, 220, 196, 0.9);
      border: 1px solid #8e7a60;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);

      transition: all .2s ease;
      padding-inline: 0.5em;
      line-height: 1.1;
    }

    .btn-invisible:hover,
    .btn-invisible:focus-visible {
      background-color: rgba(232, 220, 196, 1);
      border-color: #d4bc8c;
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
      outline: none;
    }

    /* --------------------------
       Posiciones originales de los botones (PC)
    ---------------------------*/
    .btn-comprar   { top: 12.5%; left: 69%; width: 22%; height: 6%; }
    .btn-tiktok    { top: 21.5%; left: 69%; width: 22%; height: 6%; }
    .btn-correo    { top: 30.5%; left: 69%; width: 22%; height: 6%; }
    .btn-instagram { top: 39.5%; left: 69%; width: 22%; height: 6%; }
    .btn-youtube   { top: 48.5%; left: 69%; width: 22%; height: 6%; }

    /* --------------------------
       PC/anchas: igual que antes
    ---------------------------*/
    @media (min-width: 900px) {
      .web-container {
        height: min(96dvh, 900px * 1.5);
        max-width: 900px;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.45);
        padding-inline: 0; /* sin margen adicional en PC */
      }
      .btn-invisible {
        font-size: clamp(0.8rem, 1.2vw, 1rem);
        padding-inline: 0.7em;
        border-width: 2px;
      }
    }

    /* --------------------------
       MÓVIL: NO recortar y alejar un poco la portada
       - object-fit: contain evita recortes
       - padding-inline crea “aire” lateral
       - movemos y ensanchamos ligeramente los botones
    ---------------------------*/
    @media (max-width: 899.98px) {
      .background-design {
        object-fit: contain;           /* <- clave para NO cortar por la derecha */
      }
      .web-container {
        padding-inline: 3.5vw;         /* <- “aleja” la portada de ambos bordes */
      }
      /* Botones un poco más hacia la izquierda y algo más anchos */
      .btn-comprar,
      .btn-tiktok,
      .btn-correo,
      .btn-instagram,
      .btn-youtube { left: 66%; width: 24%; }
    }

    /* Evitar "…" en móviles muy pequeños */
    @media (max-width: 400px) {
      .btn-invisible {
        font-size: 0.72rem;
        padding-inline: 0.45em;
      }
    }
  </style>
</head>

<body>
  <div class="web-container" role="main" aria-label="Portada La Semilla de Anu">
    <img
      src="portada.png"
      srcset="portada.png 1x, portada.png 2x"  <!-- si tienes portada@2x.jpg, cámbialo aquí -->
      alt="La Semilla de Anu - Diseño Oficial responsive"
      class="background-design"
      decoding="async"
      fetchpriority="high"
    />

    <div class="botones-capa" aria-hidden="false">
      <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/"
         class="btn-invisible btn-comprar" target="_blank" rel="noopener noreferrer">
         COMPRAR
      </a>

      <a href="https://www.tiktok.com/@vorticeverde82"
         class="btn-invisible btn-tiktok" target="_blank" rel="noopener noreferrer">
         TIKTOK
      </a>

      <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-correo">
         CONTACTO
      </a>

      <a href="https://www.instagram.com/vorticeverde82/"
         class="btn-invisible btn-instagram" target="_blank" rel="noopener noreferrer">
         INSTAGRAM
      </a>

      <a href="https://www.youtube.com/@DRobles82"
         class="btn-invisible btn-youtube" target="_blank" rel="noopener noreferrer">
         YOUTUBE
      </a>
    </div>
  </div>
</body>
</html>
