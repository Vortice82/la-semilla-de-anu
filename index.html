<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - David Robles</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0d0a07; 
            color: #e8dcc4;
            font-family: 'Cambria', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            overflow-x: hidden;
        }

        .seo-title {
            color: #d4bc8c;
            padding: 30px 10px;
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
        }

        /* --- CONTENEDOR DEL TEMPLO --- */
        .templo-master {
            position: relative;
            width: 96%;
            max-width: 1300px;
            margin-bottom: 50px;
            border: 1px solid #3d2b1f;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            background: #000;
        }

        /* --- EFECTO GOTEO --- */
        .efecto-goteo-contenedor {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .gota {
            position: absolute;
            top: -20px; left: 50%;
            width: 4px; height: 20px;
            background: #d4bc8c;
            box-shadow: 0 0 10px #d4bc8c;
            border-radius: 50%;
            animation: caerGota 3s infinite cubic-bezier(0.5, 0, 0.9, 0.5);
        }

        .onda {
            position: absolute;
            bottom: 5%; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border: 3px solid #d4bc8c;
            box-shadow: 0 0 15px #d4bc8c;
            border-radius: 50%;
            opacity: 0;
            animation: ondaImpacto 3s infinite;
            animation-delay: 2.1s;
        }

        @keyframes caerGota {
            0% { top: -20px; opacity: 0; }
            10% { opacity: 1; }
            70% { top: 92%; opacity: 1; }
            71% { opacity: 0; }
            100% { opacity: 0; }
        }

        @keyframes ondaImpacto {
            0% { width: 0; height: 0; opacity: 0; }
            10% { opacity: 1; }
            100% { width: 350px; height: 70px; opacity: 0; }
        }

        /* --- IMÁGENES --- */
        .background-design { width: 100%; height: auto; display: block; }
        .img-pc { display: none; }
        .img-movil { display: block; }
