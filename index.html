<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - David Robles</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">

    <style>
        /* RESET TOTAL - Evita que el navegador corte la página */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0d0a07; 
            color: #e8dcc4;
            font-family: 'Cambria', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            overflow-y: auto; /* Permite el scroll siempre */
        }

        .seo-title {
            color: #d4bc8c;
            padding: 30px 10px;
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
        }

        /* --- CONTENEDOR DEL TEMPLO (ZONA INTERACTIVA) --- */
        .templo-master {
            position: relative;
            width: 96%;
            max-width: 1300px; /* Tamaño máximo para PC */
            margin-bottom: 50px;
            border: 1px solid #3d2b1f;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            background: #000;
        }

        .background-design {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Visibilidad según pantalla */
        .img-pc { display: none; }
        .img-movil { display: block; }
        @media (min-width: 800px) {
            .img-pc { display: block; }
            .img-movil { display: none; }
        }

        /* Capa de botones */
        .botones-capa {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
        }

        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(0.5rem, 1.8vw, 0.95rem);
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .btn-escritura, .btn-juego, .btn-dioses { background: rgba(92, 64, 34, 0.92); color: #fff; border: 1px solid #f4e4bc; }
        .btn-tiktok, .btn-correo, .btn-instagram, .btn-youtube { background: rgba(0, 0, 0, 0.85); color: #d4bc8c; border: 1px solid #3d2b1f; }
        .btn-comprar { background: #d4bc8c !important; color: #1a140f !important; border: 2px solid #fff !important; }

        /* Coordenadas de los botones sobre el diseño */
        .btn-escritura { top: 55%; left: 8%; width: 24%; height: 6%; }
        .btn-juego     { top: 64%; left: 8%; width: 24%; height: 6%; }
        .btn-dioses    { top: 73%; left: 8%; width: 24%; height: 6%; }
        .btn-comprar   { top: 55%; left: 68%; width: 24%; height: 6%; }
        .btn-tiktok    { top: 64%; left: 68%; width: 24%; height: 6%; }
        .btn-correo    { top: 73%; left: 68%; width: 24%; height: 6%; }
        .btn-instagram { top: 82%; left: 68%; width: 24%; height: 6%; }
        .btn-youtube   { top: 91%; left: 68%; width: 24%; height: 6%; }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0; pointer-events: none; z-index: 5;
        }

        /* --- SECCIÓN DE INFORMACIÓN (MAPA Y TEXTO ORIGINAL) --- */
        .seccion-informacion {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0d0a07; /* Fondo sólido para evitar transparencias marrones */
        }

        .mapa-img {
            width: 100%;
            height: auto;
            border: 1px solid #3d2b1f;
            border-radius: 4px;
            margin-bottom: 40px;
            display: block;
        }

        .bloque-texto {
            text-align: center;
            line-height: 1.8;
            color: #bfa888;
            padding-bottom: 100px;
        }

        .bloque-texto h2 { 
            color: #d4bc8c; 
            margin-bottom: 25px; 
            text-transform: uppercase;
            font-size: 1.6em;
            letter-spacing: 2px;
        }

        .bloque-texto b { color: #fff; }
    </style>
</head>

    <h1 class="seo-title">La Semilla de Anu</h1>

        <img src="portada-movil.png" class="background-design img-movil" alt="Portada móvil">
        <img src="portada-pc.png" class="background-design img-pc" alt="Portada PC">
        
        <video id="videoDioses" class="video-overlay" loop playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
        
        <audio id="audioTetrico">
            <source src="sonido.mp3" type="audio/mpeg">
        </audio>
