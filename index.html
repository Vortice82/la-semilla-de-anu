            transition: 0.3s;

            max-width: 1000px;
            padding: 20px;
            text-align: center;
        }

            width: 100%;
            max-width: 900px;
            height: auto;
            border: 1px solid #3d2b1f;
            margin: 20px auto 40px auto;
            display: block;
        }

        .texto-original-restaurado {
            padding: 0 20px 100px 20px;

            color: #d4bc8c; 
            margin-bottom: 20px; 
            text-transform: uppercase;
        }

        .texto-original-restaurado b { color: #fff; }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0; pointer-events: none; z-index: 5;
        }
