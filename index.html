<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA SEMILLA DE ANU | David Robles Asuncion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Spectral:wght@400;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #050505;
            background-image: radial-gradient(circle at center, #1a140f 0%, #050505 100%);
            color: #d4bc8c; 
            font-family: 'Spectral', serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Contenedor Reforzado */
        .terminal {
            width: 100%;
            max-width: 800px;
            border: 2px solid #d4bc8c;
            background: rgba(0, 0, 0, 0.8);
            padding: 60px 40px;
            position: relative;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Adornos esquinas */
        .corner { position: absolute; width: 20px; height: 20px; border: 2px solid #d4bc8c; }
        .tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
        .br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        h1 { 
            font-family: 'Cinzel', serif;
            font-size: clamp(1.5rem, 6vw, 2.8rem);
            letter-spacing: 12px;
            margin-bottom: 10px;
            color: #d4bc8c;
        }

        .author {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: #8a6d3b;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Menú robusto sin scripts */
        .menu {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            max-width: 350px;
            margin: 0 auto;
        }

        .menu-link {
            display: block;
            text-decoration: none;
            color: #d4bc8c;
            border: 1px solid #5c4022;
            padding: 18px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            background: rgba(20, 15, 10, 0.5);
        }

        .menu-link:hover {
            background: #d4bc8c;
            color: #000;
            border-color: #fff;
            transform: translateY(-3px);
        }

        .status-line {
            margin-top: 40px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #444;
            text-transform: uppercase;
            border-top: 1px solid #222;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <h1>LA SEMILLA DE ANU</h1>
        <p class="author">David Robles Asuncion</p>

        <div class="menu">
            <a href="aventura.html" class="menu-link">INICIAR AVENTURA</a>
            <a href="adivinanzas.html" class="menu-link">EL ORÁCULO</a>
            <a href="destino.html" class="menu-link">TU DESTINO</a>
        </div>

        <div class="status-line">
            Sincronización Anunnaki: Activa | 2026-Nippur
        </div>
    </div>

</body>
</html>
