<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - Web Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; 
            background-color: #2c221a; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
        }

        .web-container {
            position: relative;
            height: 100vh;
            width: auto;
            aspect-ratio: 928 / 1238; /* Proporción de tu imagen */
            display: flex;
            justify-content: center;
        }

        .background-design {
            height: 100%;
            width: auto;
            display: block;
        }

        .botones-capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .btn-invisible {
            position: absolute;
            display: block;
            /* background: rgba(255, 0, 0, 0.3); */ /* Borra las barras /* para ver los botones en rojo y probar */
        }

        /* --- AJUSTE DE POSICIONES PARA QUE COINCIDAN CON TUS BOTONES --- */
        
        /* Botones columna derecha */
        .btn-comprar   { top: 12.5%; left: 69%; width: 22%; height: 6%; }
        .btn-tiktok    { top: 21.5%; left: 69%; width: 22%; height: 6%; }
        .btn-correo    { top: 30.5%; left: 69%; width: 22%; height: 6%; }
        .btn-instagram { top: 39.5%; left: 69%; width: 22%; height: 6%; }
        .btn-youtube   { top: 48.5%; left: 69%; width: 22%; height: 6%; }

        /* Botón Volumen I central */
        .btn-volumen1  { top: 49.5%; left: 35%; width: 30%; height: 5%; }

        @media (max-width: 600px) {
            .web-container { width: 100vw; height: auto; aspect-ratio: 928 / 1238; }
            .background-design { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <div class="web-container">
        <img src="portada.png" class="background-design" alt="La Semilla de Anu">

        <div class="botones-capa">
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-comprar" target="_blank"></a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-tiktok" target="_blank"></a>
            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-correo"></a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-instagram" target="_blank"></a>
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-youtube" target="_blank"></a>
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-volumen1" target="_blank"></a>
        </div>
    </div>

</body>
</html>
