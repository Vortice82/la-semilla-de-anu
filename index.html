<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - David Robles</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d0a07; color: #e8dcc4; font-family: 'Cambria', serif; display: flex; flex-direction: column; align-items: center; width: 100%; overflow-x: hidden; }
        .seo-title { color: #d4bc8c; padding: 30px 10px; font-size: 1.8em; text-transform: uppercase; letter-spacing: 4px; text-align: center; }
        .templo-master { position: relative; width: 96%; max-width: 1300px; margin-bottom: 50px; border: 1px solid #3d2b1f; box-shadow: 0 0 60px rgba(0,0,0,1); background: #000; }
        
        /* Efecto Gota */
        .efecto-goteo-contenedor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .gota { position: absolute; top: -20px; left: 50%; width: 4px; height: 20px; background: #d4bc8c; box-shadow: 0 0 10px #d4bc8c; border-radius: 50%; animation: caerGota 3s infinite; }
        .onda { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border: 3px solid #d4bc8c; border-radius: 50%; opacity: 0; animation: ondaImpacto 3s infinite; animation-delay: 2.1s; }
        @keyframes caerGota { 0% { top: -20px; opacity: 0; } 10% { opacity: 1; } 70% { top: 92%; opacity: 1; } 71%, 100% { opacity: 0; } }
        @keyframes ondaImpacto { 0% { width: 0; height: 0; opacity: 0; } 10% { opacity: 1; } 100% { width: 350px; height: 70px; opacity: 0; } }

        .background-design { width: 100%; height: auto; display: block; }
        .img-pc { display: none; }
        .img-movil { display: block; }
        @media (min-width: 800px) { .img-pc { display: block; } .img-movil { display: none; } }

        /* BOTONES - Coordenadas corregidas para MÓVIL */
        .botones-capa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .btn-invisible { position: absolute; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: bold; font-size: clamp(0.45rem, 1.6vw, 0.85rem); text-transform: uppercase; border-radius: 2px; transition: 0.3s; text-align: center; width: 26%; height: 5.5%; }
        
        /* Izquierda */
        .btn-col-izq { background: rgba(92, 64, 34, 0.92); color: #fff; border: 1px solid #f4e4bc; left: 7%; }
        .btn-escritura { top: 32%; }
        .btn-aventura  { top: 40%; }
        .btn-oraculo   { top: 48%; }
        .btn-arcade    { top: 56%; }
        .btn-dioses    { top: 64%; }
        .btn-destino   { top: 72%; background: rgba(139, 69, 19, 0.95); }

        /* Derecha */
        .btn-col-der { background: rgba(0, 0, 0, 0.85); color: #d4bc8c; border: 1px solid #3d2b1f; left: 67%; }
        .btn-comprar   { top: 40%; background: #d4bc8c !important; color: #1a140f !important; border: 2px solid #fff !important; animation: latido 2s infinite; }
        .btn-tiktok    { top: 48%; }
        .btn-correo    { top: 56%; }
        .btn-instagram { top: 64%; }
        .btn-youtube   { top: 72%; }

        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; z-index: 5; }
        .seccion-global { width: 100%; max-width: 1000px; padding: 40px 20px; text-align: center; }
        .mapa-img { width: 100%; max-width: 900px; height: auto; border: 1px solid #3d2b1f; margin-bottom: 40px; }
    </style>
</head>
<body>
    <h1 class="seo-title">La Semilla de Anu</h1>
    <div class="templo-master">
        <div class="efecto-goteo-contenedor"><div class="gota"></div><div class="onda"></div></div>
        <img src="portada-movil.png" class="background-design img-movil">
        <img src="portada-pc.png" class="background-design img-pc">
        <video id="videoDioses" class="video-overlay" loop playsinline muted><source src="video.mp4" type="video/mp4"></video>
        <audio id="audioTetrico"><source src="sonido.mp3" type="audio/mpeg"></audio>

        <div class="botones-capa">
            <a href="cuneiforme.html" class="btn-invisible btn-col-izq btn-escritura">ESCRITURA</a>
            <a href="aventura.html" class="btn-invisible btn-col-izq btn-aventura">AVENTURA</a>
            <a href="adivinanzas.html" class="btn-invisible btn-col-izq btn-oraculo">ORÁCULO</a>
            <a href="juego.html" class="btn-invisible btn-col-izq btn-arcade">ARCADE</a>
            <a href="javascript:void(0)" class="btn-invisible btn-col-izq btn-dioses" id="btnDioses">DIOSES</a>
            <a href="destino.html" class="btn-invisible btn-col-izq btn-destino">DESTINO</a>
            
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-col-der btn-comprar" target="_blank">COMPRAR</a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-col-der btn-tiktok" target="_blank">TIKTOK</a>
            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-col-der btn-correo">CONTACTO</a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-col-der btn-instagram" target="_blank">INSTAGRAM</a>
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-col-der btn-youtube" target="_blank">YOUTUBE</a>
        </div>
    </div>

    <script>
        const btnDioses = document.getElementById('btnDioses');
        const video = document.getElementById('videoDioses');
        const audio = document.getElementById('audioTetrico');
        async function activar() { video.style.opacity = "1"; video.muted = true; await video.play(); video.muted = false; audio.play().catch(()=>{}); }
        function desactivar() { video.style.opacity = "0"; video.pause(); audio.pause(); }
        btnDioses.addEventListener('mouseenter', activar); btnDioses.addEventListener('mouseleave', desactivar);
        btnDioses.addEventListener('touchstart', (e) => { e.preventDefault(); activar(); }); btnDioses.addEventListener('touchend', desactivar);
    </script>
</body>
</html>
