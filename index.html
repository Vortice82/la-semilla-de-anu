    <style>
        /* --- ESTILOS DE PÁGINA COMPLETA --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita barras de desplazamiento */
            background-color: #2c221a; /* Fondo oscuro de madera de tu diseño */

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* --- ESTILO COMÚN DE LOS BOTONES INVISIBLES --- */
        .invisible_btn {
            position: absolute;
            display: block;
            text-decoration: none;
