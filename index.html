<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Semilla de Anu - Sitio Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #2c221a; 
            color: #e8dcc4;
            font-family: 'Cambria', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* PORTADA */
        .main-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 10px 0;
        }

        .portada-img { width: 100%; height: auto; display: block; }

        .btn {
            position: absolute;
            background: rgba(232, 220, 196, 0.85);
            border: 1px solid #8e7a60;
            border-radius: 4px;
            color: #2c221a;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            text-transform: uppercase;
        }

        .btn-escritura { top: 12.5%; left: 8%; width: 25%; height: 6%; background: #553c28; color: #fff; }
        .btn-juego     { top: 20.5%; left: 8%; width: 25%; height: 6%; background: #d4bc8c; }
        .btn-comprar   { top: 12.5%; left: 67%; width: 25%; height: 6%; }
        .btn-tiktok    { top: 21.5%; left: 67%; width: 25%; height: 6%; }
        .btn-correo    { top: 30.5%; left: 67%; width: 25%; height: 6%; }
        .btn-instagram { top: 39.5%; left: 67%; width: 25%; height: 6%; }
        .btn-youtube   { top: 48.5%; left: 67%; width: 25%; height: 6%; }

        /* SECCIÓN MAPA Y TEXTO ORIGINAL */
        .seccion-inferior {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        .mapa-img { width: 100%; height: auto; border: 1px solid #d4bc8c; margin-bottom: 20px; }

        .texto-original {
            font-size: 1.1em;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        /* JUEGO MODAL */
        #game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
