<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Semilla de Anu - Sitio Oficial</title>
    <style>
        /* ESTILOS BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #2c221a; 
            color: #e8dcc4;
            font-family: 'Cambria', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CONTENEDOR DE PORTADA (RESPONSIVE) */
        .main-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Tamaño máximo para que no se vea gigante en PC */
            margin: 10px 0;
        }

        .portada-img {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
        }

        /* CAPA DE BOTONES */
        .botones-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .btn {
            position: absolute;
            background: rgba(232, 220, 196, 0.8);
            border: 1px solid #8e7a60;
            border-radius: 4px;
            color: #2c221a;
            font-weight: bold;
            font-size: 2.8vw; /* Fuente que escala con la imagen */
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            text-transform: uppercase;
            cursor: pointer;
        }

        @media (min-width: 600px) { .btn { font-size: 14px; } }

        /* Posiciones en % para que siempre caigan en el mismo sitio de la imagen */
        .btn-escritura { top: 12.5%; left: 8.5%; width: 23%; height: 6.5%; background: #553c28; color: #fff; }
        .btn-juego     { top: 21%; left: 8.5%; width: 23%; height: 6.5%; background: #d4bc8c; }
        
        .btn-comprar   { top: 12.5%; left: 68.5%; width: 23%; height: 6.5%; }
        .btn-tiktok    { top: 21.5%; left: 68.5%; width: 23%; height: 6.5%; }
        .btn-correo    { top: 30.5%; left: 68.5%; width: 23%; height: 6.5%; }
        .btn-instagram { top: 39.5%; left: 68.5%; width: 23%; height: 6.5%; }
        .btn-youtube   { top: 48.5%; left: 68.5%; width: 23%; height: 6.5%; }

        /* SECCIÓN DEL MAPA Y TEXTO */
