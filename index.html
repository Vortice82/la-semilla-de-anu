        @keyframes caerSuelo { 0% { top: -20px; opacity: 0; } 30% { opacity: 1; } 90% { top: 96%; opacity: 1; } 91% { opacity: 0; } 100% { opacity: 0; } }
        @keyframes ondaSuelo { 0%, 90% { width: 0; height: 0; opacity: 0; } 91% { opacity: 1; } 100% { width: 300px; height: 80px; opacity: 0; } }

    <script>
        const v = document.getElementById('vid'), sG = document.getElementById('audGota'), aL = document.getElementById('audLatido'), bD = document.getElementById('btnD');
        let audioIniciado = false;
        function activarFondo() { if (!audioIniciado) { aL.play().catch(() => {}); audioIniciado = true; } }
        function toggleGota(ver) { v.style.opacity = ver ? "1" : "0"; if(ver) { v.play(); sG.play().catch(() => {}); } else { v.pause(); } }
        bD.onmouseenter = () => toggleGota(true);
        bD.onmouseleave = () => toggleGota(false);
        bD.ontouchstart = (e) => { e.preventDefault(); toggleGota(true); };
