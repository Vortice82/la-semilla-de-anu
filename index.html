        /* --- ESTILOS GENERALES Y RESETS --- */
        * {

            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita barras de desplazamiento */

            color: #4a3b2a;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        #container_general_libro {
            width: 100%;
            max-width: 600px; /* Ancho máximo para mantener la proporción */
            background-color: #e8dcc4; /* Color base del pergamino */
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            position: relative;
            overflow: hidden;
            border: 2px solid #5d4e3e;

            background-image:

            padding-bottom: 20px;
        }

        /* --- COLUMNA IZQUIERDA: Borde decorativo de hiedra --- */
        #columna_decorativa_izq {
            width: 15%;
            border-right: 2px solid #5d4e3e;

            flex-direction: column;
            align-items: center;

        }

        /* Hiedra decorativa usando degradados (simulación) */
        .decoracion-hiedra {
            width: 80%;
            height: 100%;
            background-image: 
                radial-gradient(ellipse at 50% 10%, #d4bc8c 10px, transparent 15px),

                repeating-linear-gradient(20deg, transparent, transparent 30px, #a38c6c 32px, transparent 34px),
                radial-gradient(circle at center, transparent 0%, #e8dcc4 60%),
                radial-gradient(circle at 50% 70%, #8e7a60 6px, transparent 8px),
                radial-gradient(circle at 50% 85%, #8e7a60 6px, transparent 8px),
                linear-gradient(to right, #8e7a60 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 20%, 100% 20%, 1px 100%;
            background-position: top, 20% 25%, 80% 40%, center, center, 50% 150px, 50% 250px, 50% top;
            background-repeat: no-repeat, no-repeat, no-repeat, repeat-y, no-repeat, repeat-y, repeat-y, repeat-y;
            opacity: 0.9;
        }

        /* --- COLUMNA DERECHA: Contenido principal --- */
        #columna_contenido_der {
            width: 85%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            position: relative;
        }

        /* --- SECCIÓN SUPERIOR: Portada y Redes --- */
        #seccion_superior {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Portada a la izq, redes a la der */
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Contenedor de la portada real */
        #portada_libro_contenedor {
            grid-column: 1 / 2;
            padding: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #portada_libro_imagen {
            width: 100%;
            max-width: 180px;
            aspect-ratio: 2 / 3;
            display: block;
            border: 1px solid #c8bca0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border-radius: 2px;
        }

        /* --- BLOQUE DE ICONOS DE REDES SOCIALES (Los 5 botones) --- */
        #bloque_redes_sociales {
            grid-column: 2 / 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px; /* Espaciado entre botones */
            padding: 10px;
        }

        /* Estilo general para todos los botones de redes */
        .boton-red-social {
            width: 100%;
            max-width: 180px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: #e8dcc4;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 0.85em;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .boton-red-social:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Icono SVG general dentro del botón */
        .boton-red-social svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* --- ESTILOS ESPECÍFICOS PARA LOS 5 BOTONES (Replica de tu diseño) --- */
        
        /* 1. COMPRAR (Bronce) */
        .boton-comprar {
            background: linear-gradient(to bottom, #7d5e4a, #4a3b2a);
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid #a38c6c;
            color: #f7e9cb;
            margin-bottom: 5px; /* Espacio extra para el handle */
        }

        /* 2. TIKTOK (Azul) */
        .boton-tiktok {
            background: linear-gradient(to bottom, #4f798e, #2d4c5c);
        }

        /* 3. CORREO (Gris) */
        .boton-correo {
            background: linear-gradient(to bottom, #7a7a7a, #4a4a4a);
        }

        /* 4. INSTAGRAM (Púrpura) */
        .boton-instagram {
            background: linear-gradient(135deg, #744365 20%, #431f37 80%);
        }

        /* 5. YOUTUBE (Rojo) */
        .boton-youtube {
            background: linear-gradient(to bottom, #8f4b4b, #5c2d2d);
        }

        /* Estilo para las etiquetas de texto de handle/usuario de tu diseño */
        .etiqueta-red-social {
            color: #d4bc8c;
            font-size: 0.75em;
            margin-top: -6px;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        /* --- SECCIÓN INFERIOR: Títulos, Volumenes y Textos Cuneiformes --- */
        #seccion_inferior {
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        #titulo_principal_libro {
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            color: #4a3b2a;
