<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>La Semilla de Anu - David Robles Asunción</title>

    <style>
        /* RESET Y BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #0d0a07; 
            color: #e8dcc4; 
            font-family: 'Segoe UI', serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .seo-title { 
            color: #d4bc8c; 
            padding: 40px 15px; 
            font-size: clamp(1.8rem, 6vw, 3rem); 
            text-transform: uppercase; 
            text-align: center; 
            letter-spacing: 8px; 
            text-shadow: 0 0 15px rgba(212, 188, 140, 0.3);
        }

        /* CONTENEDOR PRINCIPAL */
        .templo-master { 
            position: relative; 
            width: 95%; 
            max-width: 1200px; 
            border: 3px solid #3d2b1f; 
            background: #000; 
            overflow: hidden; 
            line-height: 0;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .background-design { width: 100%; height: auto; display: block; position: relative; z-index: 2; }
        .img-pc { display: none; }
        @media (min-width: 850px) { .img-pc { display: block; } .img-movil { display: none; } }
        @media (max-width: 849px) { .img-movil { display: block; } }

        /* EFECTOS VISUALES CSS */
        .gota-efecto { 
            position: absolute; top: -25px; left: 50%; width: 4px; height: 20px; 
            background: linear-gradient(to bottom, transparent, #d4bc8c); 
            border-radius: 50%; z-index: 6; pointer-events: none; 
            animation: caerSuelo 4s infinite cubic-bezier(0.4, 0, 1, 1); 
        }
        .onda-efecto { 
            position: absolute; top: 96%; left: 50%; width: 10px; height: 5px; 
            border: 1.5px solid rgba(212, 188, 140, 0.5); border-radius: 50%; 
            z-index: 6; transform: translate(-50%, -50%); pointer-events: none; 
            opacity: 0; animation: ondaSuelo 4s infinite; 
        }

        @keyframes caerSuelo { 0% { top: -25px; opacity: 0; } 10% { opacity: 1; } 85% { top: 96%; opacity: 1; } 90%, 100% { opacity: 0; } }
        @keyframes ondaSuelo { 0%, 85% { width: 0; height: 0; opacity: 0; } 86% { opacity: 1; } 100% { width: 400px; height: 100px; opacity: 0; } }

        /* BOTONES NAVEGACIÓN */
        .botones-capa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .btn-invisible { 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            text-decoration: none; font-weight: 800; font-size: clamp(0.5rem, 1.8vw, 1rem); 
            text-transform: uppercase; border-radius: 4px; text-align: center; width: 25%; height: 7.2%; 
            transition: all 0.2s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }
        .btn-invisible:hover { transform: scale(1.03); filter: brightness(1.2); }

        /* IZQUIERDA */
        .btn-col-izq { left: 8%; color: #fff; }
        .btn-arcade { top: 32%; background: rgba(80, 20, 20, 0.95); border: 1.5px solid #ff6666; } 
        .btn-otros { top: 40%; background: #2a2a2a; color: #d4bc8c !important; border: 1.5px solid #d4bc8c; cursor: pointer; }
        .btn-anunakis { top: 48%; background: rgba(20, 40, 80, 0.95); border: 2px solid #66aaff; cursor: pointer; }

        /* DERECHA */
        .btn-col-der { left: 67%; color: #fff; }
        .btn-contacto { top: 32%; background: #0044ff; border: 2px solid #00ffff; }
        .btn-comprar { top: 40%; background: linear-gradient(145deg, #ffd700, #b8860b); color: #000 !important; border: 2px solid #fff; font-weight: 900; }
        .btn-social { background: #000; border: 2px solid #fff; }
        .btn-tiktok { top: 48%; border-color: #ff0050; }
        .btn-instagram { top: 56%; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .btn-youtube { top: 64%; background: #ff0000; }

        /* MODALES */
        .modal-base {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-box {
            background: #1a1612; border: 2px solid #d4bc8c; width: 90%; max-width: 500px; 
            padding: 30px; border-radius: 12px; position: relative;
        }
        .close-x { position: absolute; top: 10px; right: 20px; color: #d4bc8c; font-size: 30px; cursor: pointer; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; list-style: none; margin-top: 20px; }
        .menu-grid a { 
            display: block; padding: 12px; border: 1px solid #d4bc8c; color: #e8dcc4; 
            text-decoration: none; text-align: center; border-radius: 4px; font-weight: bold;
        }
        .menu-grid a:hover { background: #d4bc8c; color: #000; }

        /* FOOTER */
        .contenedor-ofrenda { padding: 40px 0; }
        .btn-paypal img { width: 200px; border-radius: 10px; }
    </style>
</head>
<body onclick="iniciarAudio()" ontouchstart="iniciarAudio()">

    <h1 class="seo-title">La Semilla de Anu</h1>

    <div class="templo-master">
        <img src="portada-movil.jpeg" class="background-design img-movil" alt="Móvil">
        <img src="portada-pc.jpeg" class="background-design img-pc" alt="PC">
        
        <div class="gota-efecto"></div>
        <div class="onda-efecto"></div>
        
        <audio id="audioLatido" loop src="latido.mp3"></audio>
        <audio id="audioGota" src="sonido.mp3"></audio>
        
        <nav class="botones-capa">
            <a href="juego.html" class="btn-invisible btn-col-izq btn-arcade">Arcade</a>
            <div class="btn-invisible btn-col-izq btn-otros" onclick="abrirModal('modalOtros')">Otros Mundos</div>
            <div class="btn-invisible btn-col-izq btn-anunakis" onclick="menuAnunaki()">Anunakis</div>

            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-col-der btn-contacto">Mensaje</a>
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-col-der btn-comprar" target="_blank">Comprar</a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-col-der btn-social btn-tiktok" target="_blank">TikTok</a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-col-der btn-social btn-instagram" target="_blank">Instagram</a>
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-col-der btn-social btn-youtube" target="_blank">YouTube</a>
        </nav>
    </div>

    <div id="modalAnunakis" class="modal-base">
        <div class="modal-box">
            <span class="close-x" onclick="cerrarModales()">&times;</span>
            <h2 style="text-align:center; color:#d4bc8c">ANUNAKIS</h2>
            <div class="menu-grid">
                <a href="cuneiforme.html">Escritura</a>
                <a href="aventura.html">Aventura</a>
                <a href="adivinanzas.html">Oráculo</a>
                <a href="juego.html">Arcade</a>
                <a href="destino.html">Destino</a>
                <a href="#" onclick="cerrarModales()">Cerrar</a>
            </div>
        </div>
    </div>

    <div id="modalOtros" class="modal-base">
        <div class="modal-box">
            <span class="close-x" onclick="cerrarModales()">&times;</span>
            <h2 style="text-align:center; color:#d4bc8c">OTROS MUNDOS</h2>
            <div style="max-height:300px; overflow-y:auto; margin-top:20px; font-size:0.9rem;">
                <p>Alan y Sally Landsburg, J.J. Benitez, Erich von Daniken, Javier Sierra, Peter Kolosimo...</p>
            </div>
        </div>
    </div>

    <div class="contenedor-ofrenda">
        <form action="https://www.paypal.com/donate" method="post" target="_top">
            <input type="hidden" name="hosted_button_id" value="7M9F87AUJ6T2J" />
            <button type="submit" style="background:none; border:none; cursor:pointer" class="btn-paypal">
                <img src="Gemini_Generated_Image_g6d4ytg6d4ytg6d4.jpg" alt="Donar">
            </button>
        </form>
    </div>

    <script>
        const latido = document.getElementById('audioLatido');
        const gota = document.getElementById('audioGota');
        let iniciado = false;

        function iniciarAudio() {
            if (!iniciado) {
                latido.play().catch(e => console.log("Esperando interacción"));
                iniciado = true;
            }
        }

        function menuAnunaki() {
            gota.currentTime = 0;
            gota.play();
            document.getElementById('modalAnunakis').style.display = 'flex';
        }

        function abrirModal(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function cerrarModales() {
            document.querySelectorAll('.modal-base').forEach(m => m.style.display = 'none');
        }

        window.onclick = (e) => { if (e.target.className === 'modal-base') cerrarModales(); }
    </script>
</body>
</html>
