<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Semilla de Anu - David Robles</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            min-height: 100%; 
            background-color: #0d0a07; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Cambria', 'Georgia', serif;
            color: #e8dcc4;
            overflow-x: hidden; 
            width: 100%;
        }

        .seo-title {
            color: #d4bc8c;
            text-align: center;
            padding: 25px 10px;
            font-size: 1.6em;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .web-container {
            position: relative;
            width: 96%; 
            margin: 10px auto;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            background-color: #000;
            overflow: hidden;
            border: 1px solid #2a1f15;
        }

        /* Forzamos que la imagen se vea */
        .background-design { 
            width: 100%; 
            height: auto; 
            display: block; 
            position: relative;
            z-index: 1;
        }

        /* Lógica de imágenes según tu GitHub */
        .img-pc { display: none; }
        .img-movil { display: block; }
        .web-container { max-width: 500px; }

        @media (min-width: 800px) {
            .img-pc { display: block; }
            .img-movil { display: none; }
            .web-container { max-width: 1000px; }
        }

        .botones-capa { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; /* Por encima de la imagen */
        }

        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(0.45rem, 2.2vw, 0.8rem); 
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.3s ease;
            padding: 2px;
            white-space: nowrap;
        }

        /* Estilos de botones */
        .btn-escritura, .btn-juego, .btn-dioses { background-color: rgba(139, 101, 52, 0.9); color: #fff; border: 1px solid #f4e4bc; }
        .btn-tiktok, .btn-correo, .btn-instagram, .btn-youtube { background-color: rgba(0, 0, 0, 0.85); color: #d4bc8c; border: 1px solid #3d2b1f; }

        .btn-comprar {
            background-color: #d4bc8c !important;
            color: #1a140f !important;
            border: 2px solid #fff !important;
            box-shadow: 0 0 10px rgba(212, 188, 140, 0.5) !important;
            overflow: hidden;
        }

        .btn-comprar::after {
            content: "";
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            animation: destelloGlow 3s infinite;
        }

        @keyframes destelloGlow { 0% { left: -100%; } 15% { left: 100%; } 100% { left: 100%; } }

        /* Posiciones ajustadas para las nuevas imágenes del templo */
        .btn-escritura { top: 55%; left: 8%; width: 24%; height: 6%; }
        .btn-juego     { top: 64%; left: 8%; width: 24%; height: 6%; }
        .btn-dioses    { top: 73%; left: 8%; width: 24%; height: 6%; }
        
        .btn-comprar   { top: 55%; left: 68%; width: 24%; height: 6%; }
        .btn-tiktok    { top: 64%; left: 68%; width: 24%; height: 6%; }
        .btn-correo    { top: 73%; left: 68%; width: 24%; height: 6%; }
        .btn-instagram { top: 82%; left: 68%; width: 24%; height: 6%; }
        .btn-youtube   { top: 91%; left: 68%; width: 24%; height: 6%; }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <h1 class="seo-title">La Semilla de Anu</h1>

    <div class="web-container">
        <img src="portada-movil.png" class="background-design img-movil" alt="Entrada al Templo">
        <img src="portada-pc.png" class="background-design img-pc" alt="Entrada al Templo PC">
        
        <video id="videoDioses" class="video-overlay" loop playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
        </video>
        
        <audio id="audioTetrico" preload="auto">
            <source src="sonido.mp3" type="audio/mpeg">
        </audio>

        <div class="botones-capa">
            <a href="cuneiforme.html" class="btn-invisible btn-escritura">ESCRITURA</a>
            <a href="juego.html" class="btn-invisible btn-juego">EL JUEGO</a>
            <a href="javascript:void(0)" class="btn-invisible btn-dioses" id="btnDioses">DIOSES</a>
            
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-comprar" target="_blank">COMPRAR</a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-tiktok" target="_blank">TIKTOK</a>
            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-correo">CONTACTO</a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-instagram" target="_blank">INSTAGRAM</a>
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-youtube" target="_blank">YOUTUBE</a>
        </div>
    </div>

    <script>
        // ... (Tu script de audio y video se mantiene igual)
        const btnDioses = document.getElementById('btnDioses');
        const video = document.getElementById('videoDioses');
        const audio = document.getElementById('audioTetrico');

        function activar() {
            video.style.opacity = "1";
            video.muted = false; 
            video.volume = 0.7;
            video.play();
            audio.volume = 0.6;
            audio.play().catch(e => {});
        }

        function desactivar() {
            video.style.opacity = "0";
            video.pause();
            video.currentTime = 0;
            audio.pause();
        }

        btnDioses.addEventListener('mouseenter', activar);
        btnDioses.addEventListener('mouseleave', desactivar);
        btnDioses.addEventListener('touchstart', (e) => { e.preventDefault(); activar(); });
        btnDioses.addEventListener('touchend', desactivar);

        const desbloquearAudio = () => {
            video.play().then(() => { video.pause(); video.currentTime = 0; });
            audio.load();
            document.removeEventListener('mousedown', desbloquearAudio);
            document.removeEventListener('touchstart', desbloquearAudio);
        };
        document.addEventListener('mousedown', desbloquearAudio);
        document.addEventListener('touchstart', desbloquearAudio);
    </script>

</body>
</html>
