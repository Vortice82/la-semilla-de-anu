<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Semilla de Anu - David Robles</title>

    <style>
        /* BASE Y PREVENCIÓN DE DESPLAZAMIENTO LATERAL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            min-height: 100%; 
            background-color: #1a140f; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Cambria', 'Georgia', serif;
            color: #e8dcc4;
            overflow-x: hidden; 
            width: 100%;
        }

        .seo-title {
            color: #d4bc8c;
            text-align: center;
            padding: 20px 10px;
            font-size: 1.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* CONTENEDOR PORTADA FLEXIBLE */
        .web-container {
            position: relative;
            width: 92%; 
            max-width: 500px; 
            aspect-ratio: 928 / 1238; 
            margin: 10px auto;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background-color: #000;
            overflow: hidden;
        }

        .background-design { 
            width: 100%; 
            height: 100%; 
            display: block;
            object-fit: contain; 
        }

        .botones-capa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* BOTONES ADAPTABLES */
        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(0.45rem, 2.2vw, 0.8rem); 
            text-transform: uppercase;
            border-radius: 3px;
            z-index: 10;
            background-color: rgba(20, 15, 10, 0.9); 
            color: #a68d6a; 
            border: 1px solid #4d3a2a;
            padding: 2px;
            white-space: nowrap;
        }

        .btn-comprar {
            background-color: #d4bc8c !important;
            color: #1a140f !important;
            border: 1px solid #fff !important;
            box-shadow: 0 0 10px rgba(212, 188, 140, 0.5) !important;
        }

        /* POSICIONES */
        .btn-escritura { top: 12.5%; left: 8%; width: 25%; height: 6%; }
        .btn-juego     { top: 21.5%; left: 8%; width: 25%; height: 6%; }
        .btn-dioses    { top: 30.5%; left: 8%; width: 25%; height: 6%; }
        .btn-comprar   { top: 12.5%; left: 67%; width: 25%; height: 6%; }
        .btn-tiktok    { top: 21.5%; left: 67%; width: 25%; height: 6%; }
        .btn-correo    { top: 30.5%; left: 67%; width: 25%; height: 6%; }
        .btn-instagram { top: 39.5%; left: 67%; width: 25%; height: 6%; }
        .btn-youtube   { top: 48.5%; left: 67%; width: 25%; height: 6%; }

        /* VÍDEO */
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 5;
        }

        /* MAPA */
        .seccion-mapa { width: 100%; max-width: 900px; padding: 20px; text-align: center; }
        .mapa-img { width: 92%; height: auto; border: 1px solid #3d2b1f; border-radius: 8px; }

        /* BLOQUE DE TEXTO RECUPERADO */
        .texto-paises {
            max-width: 800px;
            margin: 20px auto 60px auto;
            padding: 0 25px;
            color: #e8dcc4;
            text-align: center;
            line-height: 1.6;
        }

        .texto-paises h2 {
            color: #d4bc8c;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 1.4em;
        }

        .texto-paises h3 {
            color: #f4e4bc;
            margin: 20px 0 10px 0;
            font-size: 1.1em;
        }

        .texto-paises b { color: #f4e4bc; }

    </style>
</head>
<body>
