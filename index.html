<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - David Robles</title>
    <meta name="description" content="Web oficial de la saga La Semilla de Anu de David Robles.">
    <link rel="canonical" href="https://vortice82.github.io/la-semilla-de-anu/index.html">

    <style>
        /* 1. RESET Y ESTILOS DE BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            min-height: 100%; 
            background-color: #1a140f; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
            font-family: 'Cambria', 'Georgia', serif;
            color: #e8dcc4;
        }

        .seo-title {
            color: #d4bc8c;
            text-align: center;
            padding: 30px 10px 10px 10px;
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* 2. CONTENEDOR DE PORTADA */
        .web-container {
            position: relative;
            max-height: 85vh; 
            width: auto;
            aspect-ratio: 928 / 1238; 
            display: flex;
            justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            margin: 20px 0;
            border: 1px solid #3d2b1f;
        }

        .background-design { height: 100%; width: auto; display: block; }
        .botones-capa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 3. ESTILO DE BOTONES (UNIFICADOS OSCUROS) */
        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85em;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
            z-index: 10;
            background-color: rgba(20, 15, 10, 0.9); 
            color: #a68d6a; 
            border: 1px solid #4d3a2a;
        }

        .btn-invisible:hover {
            background-color: rgba(44, 34, 26, 1);
            color: #d4bc8c;
            border-color: #d4bc8c;
            transform: scale(1.05);
        }

        /* BOTÓN COMPRAR (EL QUE MÁS RESALTA) */
        .btn-comprar {
            background-color: #d4bc8c !important;
            color: #1a140f !important;
            border: 2px solid #fff !important;
            box-shadow: 0 0 20px rgba(212, 188, 140, 0.5) !important;
        }

        /* POSICIONES EXACTAS */
        .btn-escritura { top: 12.5%; left: 9%; width: 22%; height: 6%; }
        .btn-juego     { top: 21.5%; left: 9%; width: 22%; height: 6%; }
        .btn-dioses    { top: 30.5%; left: 9%; width: 22%; height: 6%; }
        
        .btn-comprar   { top: 12.5%; left: 69%; width: 22%; height: 6%; }
        .btn-tiktok    { top: 21.5%; left: 69%; width: 22%; height: 6%; }
        .btn-correo    { top: 30.5%; left: 69%; width: 22%; height: 6%; }
        .btn-instagram { top: 39.5%; left: 69%; width: 22%; height: 6%; }
        .btn-youtube   { top: 48.5%; left: 69%; width: 22%; height: 6%; }

        /* 4. EFECTOS MULTIMEDIA */
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: 5;
        }

        /* 5. SECCIÓN MAPA */
        .seccion-mapa { width: 100%; max-width: 900px; padding: 40px 20px; text-align: center; }
        .mapa-img { width: 100%; border: 1px solid #3d2b1f; border-radius: 8px; }

        @media (max-width: 600px) {
            .web-container { width: 95vw; }
            .btn-invisible { font-size: 0.5em; }
        }
    </style>
</head>
<body>

    <h1 class="seo-title">La Semilla de Anu</h1>

    <div class="web-container">
        <img src="portada.png" class="background-design" alt="Portada Libro David Robles">

        <video id="videoDioses" class="video-overlay" muted loop playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
        </video>

        <audio id="audioTetrico" preload="auto">
            <source src="sonido.mp3" type="audio/mpeg">
        </audio>

        <div class="botones-capa">
            <a href="cuneiforme.html" class="btn-invisible btn-escritura">ESCRITURA</a>
            <a href="juego.html" class="btn-invisible btn-juego">EL JUEGO</a>
            <a href="#" class="btn-invisible btn-dioses">DIOSES</a>
            
            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-comprar" target="_blank">COMPRAR LIBRO</a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-tiktok" target="_blank">TIKTOK</a>
            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-correo">CONTACTO</a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-instagram" target="_blank">INSTAGRAM</a>
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-youtube" target="_blank">YOUTUBE</a>
        </div>
    </div>

    <div class="seccion-mapa">
        <img src="mapa.jpg" class="mapa-img" alt="Mapa de distribución">
    </div>

    <script>
        const btnDioses = document.querySelector('.btn-dioses');
        const video = document.getElementById('videoDioses');
        const audio = document.getElementById('audioTetrico');

        btnDioses.addEventListener('mouseenter', () => {
            // Mostrar y reproducir vídeo
            video.style.opacity = "1";
            video.play();
            
            // Reproducir sonido
            audio.volume = 0.5;
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio en espera de interacción del usuario"));
        });

        btnDioses.addEventListener('mouseleave', () => {
            // Ocultar y pausar todo
            video.style.opacity = "0";
            video.pause();
            video.currentTime = 0;
            
            audio.pause();
            audio.currentTime = 0;
        });

        // Activa el motor de audio al primer clic del usuario en la web
        document.body.addEventListener('click', () => {
            audio.load(); 
        }, {once: true});
    </script>

</body>
</html>
