<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Semilla de Anu - David Robles</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0f0f0f;
            color: #e0d0b0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- SECCIÓN DE PORTADA (HERO) --- */
        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url('portada-pc.png') no-repeat center center;
            background-size: cover;
            padding: 20px;
        }

        /* Capa oscura para que el texto resalte sobre la imagen */
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .contenido-hero {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px #000;
        }

        /* --- VENTANA DE PIEDRA INTEGRADA --- */
        .tablilla-piedra {
            background: rgba(61, 51, 41, 0.85); /* Semitransparente para ver la portada de fondo */
            background-image: url('https://www.transparenttextures.com/patterns/rock.png');
            border: 4px solid #261e18;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 15px;
        }

        .tablilla-piedra h3 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            margin: 0 0 15px 0;
            font-size: 1.2em;
        }

        .tablilla-piedra input, .tablilla-piedra textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #d4af37;
            color: #fff;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
