<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La Semilla de Anu - Sitio Oficial</title>
  <style>
    /* Reset y base */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #2c221a;                  /* marrón oscuro */
      display: grid;
      place-items: center;
      overflow: hidden;                     /* sin scroll */
      font-family: Cambria, Georgia, "Times New Roman", serif;
    }

    /* === CONTENEDOR “shrink-to-fit” del tamaño EXACTO de la imagen === */
    .web-container {
      position: relative;
      display: inline-block;                /* se ajusta al tamaño del contenido (la imagen) */
      max-height: 96vh;                     /* cabe en pantalla */
      /* Sombra y bordes opcionales */
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      overflow: hidden;
    }

    /* La imagen gobierna el tamaño del contenedor */
    .background-design {
      display: block;
      height: min(96vh, 100vh);             /* nunca supera la altura útil */
      width: auto;                          /* mantiene proporción exacta */
      image-rendering: auto;                /* suavizado estándar */
      /* Si la ves demasiado “suave” en escritorio y tienes @2x, sube el contenedor con más ancho (ver @media abajo) */
    }

    /* Capa sobre la imagen, mismo tamaño */
    .botones-capa {
      position: absolute;
      inset: 0;                             /* ocupa exactamente el área de la imagen */
      pointer-events: none;                 /* sólo clic en los botones */
    }

    /* Botones visibles y accesibles */
    .btn-invisible {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      pointer-events: auto;
      user-select: none;

      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      font-size: clamp(0.72rem, 1.2vw, 1rem);

      color: #2c221a;
      background-color: rgba(232,220,196,0.82);
      border: 2px solid #8e7a60;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);

      transition: transform .18s ease, box-shadow .18s ease, background-color .18s ease, border-color .18s ease;
      padding-inline: 0.4em;
    }
    .btn-invisible:hover,
    .btn-invisible:focus-visible {
      background-color: rgba(232,220,196,0.95);
      border-color: #d4bc8c;
      transform: translateY(-1px) scale(1.03);
      box-shadow: 0 4px 10px rgba(0,0,0,0.45);
      outline: none;
    }
    .btn-invisible:focus-visible::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 10px;
      outline: 3px solid #f2d38a;
      filter: drop-shadow(0 0 6px rgba(242,211,138,0.6));
    }
    .btn-invisible span {
      display: inline-block;
      width: 100%;
      text-align: center;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-inline: 0.2em;
    }

    /* === POSICIONAMIENTO relativo a la imagen (mismos %) que usabas === */
    .btn-comprar   { top: 12.5%; left: 69%; width: 22%; height: 6%; }
    .btn-tiktok    { top: 21.5%; left: 69%; width: 22%; height: 6%; }
    .btn-correo    { top: 30.5%; left: 69%; width: 22%; height: 6%; }
    .btn-instagram { top: 39.5%; left: 69%; width: 22%; height: 6%; }
    .btn-youtube   { top: 48.5%; left: 69%; width: 22%; height: 6%; }

    /* Ajustes móviles */
    @media (max-width: 600px) {
      .background-design { height: 94vh; }
      .btn-invisible { font-size: clamp(0.7rem, 3vw, 0.9rem); border-width: 1.5px; }
    }

    /* Si tienes versión @2x, permite que el contenedor use un poco más de ancho en pantallas grandes */
    @media (min-width: 1100px) {
      .background-design { height: 92vh; }  /* margen visual superior en sobremesa */
    }
  </style>
</head>
<body>

  <div class="web-container" role="main" aria-label="Portada La Semilla de Anu">
    <!-- IMPORTANTÍSIMO: añade tu versión @2x en srcset para más nitidez -->
    <img
      src="portada.png"
      srcset="portada.png 928w, portada@2x.jpg 1856w"
      sizes="(max-width: 600px) 94vh, 96vh"
      alt="La Semilla de Anu"
      class="background-design"
      decoding="async"
      fetchpriority="high"
    />

    <div class="botones-capa">
      <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-comprar" target="_blank" rel="noopener noreferrer"><span>COMPRAR</span></a>
      <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-tiktok" target="_blank" rel="noopener noreferrer"><span>TIKTOK</span></a>
      <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-correo"><span>CONTACTO</span></a>
      <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-instagram" target="_blank" rel="noopener noreferrer"><span>INSTAGRAM</span></a>
      <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-youtube" target="_blank" rel="noopener noreferrer"><span>YOUTUBE</span></a>
    </div>
  </div>

</body>
</html>
