    <style>
        /* 1. CONFIGURACIÓN GLOBAL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #2c221a; /* Color de fondo oficial */
            color: #e8dcc4;
            font-family: 'Cambria', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1.seo-title {
            color: #d4bc8c;
            text-align: center;
            padding: 20px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        /* 2. CONTENEDOR MAESTRO (Evita el blanco y el recorte) */
        .web-container {
            position: relative;
            width: 95vw; /* Casi todo el ancho del móvil */
            max-width: 500px; /* Tamaño máximo en PC */
            margin: 0 auto;
            line-height: 0; /* Elimina espacios fantasma bajo la imagen */
        }

        .background-design {
            width: 100%;
            height: auto;
            display: block;
            border: 2px solid #4a3b2c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 3. CAPA DE BOTONES (Ajustada a la imagen) */
        .botones-capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #2c221a; 
            font-weight: bold;
            font-size: 2.8vw; /* Tamaño de fuente relativo al ancho del móvil */
            text-transform: uppercase;
            background-color: rgba(232, 220, 196, 0.8); 
            border: 1px solid #8e7a60; 
            border-radius: 4px;
            transition: transform 0.2s;
            text-align: center;
        }

        /* Ajuste de fuente para pantallas grandes */
        @media (min-width: 500px) {
            .btn-invisible { font-size: 14px; }
        }

        /* Posiciones exactas basadas en porcentajes de la imagen */
        .btn-escritura { top: 12.5%; left: 8%; width: 24%; height: 6%; background-color: #553c28; color: #e8dcc4; }
        .btn-juego     { top: 21.5%; left: 8%; width: 24%; height: 6%; background-color: #b8860b; color: #fff; }
        
        .btn-comprar   { top: 12.5%; left: 68%; width: 24%; height: 6%; }
        .btn-tiktok    { top: 21.5%; left: 68%; width: 24%; height: 6%; }
        .btn-correo    { top: 30.5%; left: 68%; width: 24%; height: 6%; }
        .btn-instagram { top: 39.5%; left: 68%; width: 24%; height: 6%; }
        .btn-youtube   { top: 48.5%; left: 68%; width: 24%; height: 6%; }

        /* 4. SECCIONES INFERIORES */
        .seccion-inferior {
            width: 95vw;
            max-width: 800px;
            text-align: center;
            padding: 20px 0 50px 0;
        }

        .mapa-img {
            width: 100%;
            height: auto;
            margin: 20px 0;
            border: 1px solid #8e7a60;
        }

        footer {
            width: 100%;
            padding: 30px;
            background: #1a1510;
            border-top: 1px solid #4a3b2c;
            font-size: 0.8rem;
            color: #8e7a60;
        }
    </style>
</head>
<body>

            <a href="https://www.exlibric.com/libro/la-semilla-de-anu-volumen-i-anunaki/" class="btn-invisible btn-comprar" target="_blank">COMPRAR</a>
            <a href="https://www.tiktok.com/@vorticeverde82" class="btn-invisible btn-tiktok" target="_blank">TIKTOK</a>
            <a href="mailto:vortice_verde@hotmail.com" class="btn-invisible btn-correo">CONTACTO</a>
            <a href="https://www.instagram.com/vorticeverde82/" class="btn-invisible btn-instagram" target="_blank">INSTAGRAM</a>
            <a href="https://www.youtube.com/@DRobles82" class="btn-invisible btn-youtube" target="_blank">YOUTUBE</a>
        </div>
    </div>

    <div class="seccion-inferior">

</body>
