<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Semilla de Anu - David Robles</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            min-height: 100%; 
            background-color: #0d0a07; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Cambria', 'Georgia', serif;
            color: #e8dcc4;
            overflow-x: hidden; 
            width: 100%;
        }

        .seo-title {
            color: #d4bc8c;
            text-align: center;
            padding: 25px 10px;
            font-size: 1.6em;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .web-container {
            position: relative;
            width: 100%; 
            margin: 10px auto;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            background-color: #000;
            overflow: hidden;
            border: 1px solid #2a1f15;
            max-width: 500px; /* Tamaño móvil */
        }

        @media (min-width: 800px) {
            .web-container { max-width: 1300px; } /* PC AMPLIADO PARA VERSE MÁS GRANDE */
        }

        .background-design { 
            width: 100%; 
            height: auto; 
            display: block; 
            position: relative;
            z-index: 1;
        }

        /* Lógica de imagen según dispositivo */
        .img-pc { display: none; }
        .img-movil { display: block; }

        @media (min-width: 800px) {
            .img-pc { display: block; }
            .img-movil { display: none; }
        }

        /* CAPA DE BOTONES */
        .botones-capa { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 10; 
        }

        .btn-invisible {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(0.45rem, 2.2vw, 0.8rem); 
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .btn-escritura, .btn-juego, .btn-dioses { background-color: rgba(139, 101, 52, 0.9); color: #fff; border: 1px solid #f4e4bc; }
